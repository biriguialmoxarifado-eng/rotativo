<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ALMOXA PRO — Coletor Inteligente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --g900:#10371D; --g800:#164A29; --g700:#1B5E3F; --g600:#1E6B45; --g500:#2E9E6A;
  --g400:#34C77B; --g050:#E8F3ED;
  --bg:#EEF3F0; --card:#FFFFFF; --ink:#16261E; --ink2:#33473D; --muted:#6E817857; --muted2:#6E8178;
  --line:#E3EAE6;
  --ok:#1FA463; --okbg:#E6F6EE; --pend:#E0A21A; --pendbg:#FCF3DC; --div:#E0413E; --divbg:#FBE7E7;
  --blue:#1A8FE3; --bluebg:#E5F1FB; --crit:#E0413E;
  --r:14px; --r2:10px;
  --sh:0 2px 10px rgba(16,55,29,.06), 0 10px 30px rgba(16,55,29,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;background:#0c160f;color:var(--ink);
  display:flex;justify-content:center;padding:0;min-height:100vh;
}
.display{font-family:'Syne','Inter',sans-serif;font-weight:800;letter-spacing:-.01em}

/* phone frame */
.phone{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5)}
@media(min-width:480px){ .phone{margin:18px 0;min-height:calc(100vh - 36px);border-radius:30px} }

/* status bar */
.sbar{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:12px;font-weight:600;color:#fff;background:var(--g700)}
.sbar .r{display:flex;gap:5px;align-items:center;font-size:11px}

/* header */
.hdr{background:linear-gradient(160deg,var(--g700),var(--g600));color:#fff;padding:14px 16px 16px}
.hdr.tall{padding-bottom:20px}
.hdr-row{display:flex;align-items:center;gap:12px}
.hdr-row .ic{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:16px;border:none;color:#fff;cursor:pointer;flex-shrink:0}
.hdr h1{font-size:17px;margin:0;line-height:1.15}
.hdr .sub{font-size:11.5px;opacity:.82;margin-top:1px}
.hdr .spacer{flex:1}

/* screen scroller */
.screens{position:relative}
.screen{display:none;padding-bottom:78px;min-height:60vh}
.screen.active{display:block;animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pad{padding:14px 16px}

/* cards & bits */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.sec-title{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--ink);margin:6px 2px 10px;text-transform:uppercase}
.muted{color:var(--muted2)}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px}
.pill.ok{background:var(--okbg);color:var(--ok)} .pill.pend{background:var(--pendbg);color:var(--pend)}
.pill.div{background:var(--divbg);color:var(--div)} .pill.blue{background:var(--bluebg);color:var(--blue)}
.pill.crit{background:var(--divbg);color:var(--crit)}

/* greeting */
.greet{background:linear-gradient(160deg,var(--g700),var(--g600));color:#fff;padding:0 16px 18px;margin-top:-2px}
.greet .hi{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700}
.badge-on{font-size:10px;font-weight:700;background:rgba(255,255,255,.18);padding:3px 9px;border-radius:20px;display:inline-flex;gap:5px;align-items:center}
.greet .sy{font-size:11px;opacity:.8;margin-top:8px;line-height:1.7}

/* overview grid */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ov{padding:13px 14px;border-radius:var(--r)}
.ov .n{font-size:24px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.ov .l{font-size:11px;color:var(--muted2);margin-top:3px}
.ov .t{font-size:11px;font-weight:600;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ov.green{background:linear-gradient(150deg,#fff,#F2F9F5);border:1px solid #DCEDE4}
.ov.green .n{color:var(--g600)}
.ov.blue{background:linear-gradient(150deg,#fff,#EFF6FD);border:1px solid #DBEAF7} .ov.blue .n{color:var(--blue)}
.ov.amber{background:linear-gradient(150deg,#fff,#FDF8EC);border:1px solid #F1E6C9} .ov.amber .n{color:var(--pend)}
.ov.red{background:linear-gradient(150deg,#fff,#FCEFEF);border:1px solid #F3D8D8} .ov.red .n{color:var(--div)}

/* quick actions */
.qa{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.qa button{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;font-family:inherit}
.qa .qi{width:34px;height:34px;border-radius:9px;background:var(--g050);color:var(--g600);display:flex;align-items:center;justify-content:center;font-size:16px}
.qa .ql{font-size:10.5px;font-weight:600;color:var(--ink2);text-align:center;line-height:1.25}

/* list rows */
.row{display:flex;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.prog{height:6px;border-radius:6px;background:#EAEFEC;overflow:hidden;margin-top:8px}
.prog>i{display:block;height:100%;border-radius:6px}

/* tabs */
.tabs{display:flex;gap:6px;background:#E7EEEA;border-radius:11px;padding:4px;margin-bottom:14px}
.tabs button{flex:1;border:none;background:transparent;padding:8px 6px;font-size:12px;font-weight:600;color:var(--muted2);border-radius:8px;cursor:pointer;font-family:inherit}
.tabs button.on{background:#fff;color:var(--g600);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-primary{background:var(--g600);color:#fff}
.btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink2)}
.btn-soft{background:var(--g050);color:var(--g600)}
.btn-sm{padding:9px 12px;font-size:12px;border-radius:9px;width:auto}

/* search */
.search{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 13px;color:var(--muted2);font-size:13px;margin-bottom:13px}
.search input{border:none;outline:none;flex:1;font-family:inherit;font-size:13px;background:transparent}

/* stat trio */
.trio{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);border-radius:var(--r);overflow:hidden;border:1px solid var(--line)}
.trio>div{background:#fff;padding:13px 8px;text-align:center}
.trio .n{font-size:23px;font-weight:800;font-family:'Syne',sans-serif;line-height:1}
.trio .l{font-size:10.5px;color:var(--muted2);margin-top:4px}

/* item card */
.item{display:flex;align-items:center;gap:12px;padding:13px 14px}
.thumb{width:42px;height:42px;border-radius:10px;background:var(--g050);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.icirc{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;font-weight:800}
.icirc.ok{background:var(--ok);color:#fff} .icirc.pend{background:#fff;border:2px solid var(--pend);color:var(--pend)}
.icirc.div{background:var(--div);color:#fff}

/* keypad */
.counter{display:flex;align-items:center;justify-content:space-between;padding:6px 4px}
.counter .stepper{width:54px;height:54px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:24px;color:var(--g600);cursor:pointer;display:flex;align-items:center;justify-content:center}
.counter .big{text-align:center}
.counter .big b{font-size:40px;font-family:'Syne',sans-serif;font-weight:800;line-height:1;display:block}
.counter .big span{font-size:11px;color:var(--muted2);letter-spacing:.08em}
.keys{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:14px}
.keys button{background:#fff;border:1px solid var(--line);border-radius:11px;padding:15px 0;font-size:20px;font-weight:700;font-family:inherit;color:var(--ink);cursor:pointer}

/* stepper rows */
.steprow{display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 14px;margin-bottom:11px}
.steprow .v{text-align:center}.steprow .v b{font-size:20px;font-family:'Syne',sans-serif}.steprow .v span{font-size:10px;color:var(--muted2);display:block;letter-spacing:.08em}
.stepbtn{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:#fff;font-size:20px;color:var(--g600);cursor:pointer}
.chips{display:flex;gap:8px;margin:6px 0 14px}
.chips button{flex:1;border:1px solid var(--line);background:#fff;border-radius:9px;padding:10px 4px;font-size:12px;font-weight:700;color:var(--muted2);cursor:pointer;font-family:inherit}
.chips button.on{background:var(--g600);color:#fff;border-color:var(--g600)}
.calcbox{background:var(--g050);border:1px solid #CFE7DA;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px}
.calcbox .t{font-size:11px;color:var(--g600);font-weight:600}
.calcbox .b{font-size:30px;font-family:'Syne',sans-serif;font-weight:800;color:var(--g600);margin-top:3px}

/* form */
.field{margin-bottom:14px}
.field label{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.02em;display:block;margin-bottom:6px}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:10px;padding:12px 13px;font-size:14px;font-family:inherit;background:#fff;outline:none}
.opt{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:14px;font-weight:600}
.opt .dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.opt.sel{border-color:var(--ok);background:var(--okbg)} .opt.sel .dot{border-color:var(--ok);background:var(--ok);color:#fff;font-size:12px}

/* result lines */
.resline{display:flex;align-items:center;gap:11px;padding:11px 14px;border-bottom:1px solid var(--line)}
.resline:last-child{border-bottom:none}
.resline .lbl{flex:1;font-size:13px;font-weight:600}
.resline .val{font-size:15px;font-weight:800;font-family:'Syne',sans-serif}
.tag{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}

/* bottom nav */
.nav{position:absolute;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;background:#fff;border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding:8px 6px 10px;z-index:40}
.nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted2);cursor:pointer;font-family:inherit;font-weight:600;flex:1}
.nav button.on{color:var(--g600)}
.nav .scan{width:46px;height:46px;border-radius:50%;background:var(--g600);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;margin-top:-22px;box-shadow:0 6px 16px rgba(30,107,69,.4)}
.nav .ico{font-size:18px}

/* helpers */
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mt12{margin-top:12px}
.flexb{display:flex;align-items:center;justify-content:space-between}
.divider{height:1px;background:var(--line);margin:2px 0}
.note{font-size:11px;color:var(--muted2);line-height:1.6}
.code{font-family:ui-monospace,monospace;font-size:11px;color:var(--muted2)}
.banner{background:#fff;border:1px dashed #CFE7DA;border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:center}
.kpi-bars{display:flex;align-items:flex-end;gap:22px;height:120px;padding:10px 20px 0;justify-content:center}
.kpi-bars .bar{width:56px;border-radius:7px 7px 0 0;display:flex;align-items:flex-start;justify-content:center;color:#fff;font-weight:800;font-size:13px;padding-top:6px;font-family:'Syne',sans-serif}
.kpi-bars .lab{font-size:10px;color:var(--muted2);text-align:center;margin-top:6px}
</style>
</head>
<body>
<div class="phone">
  <div class="sbar">
    <span id="clock">9:41</span>
    <span class="r">ALMOXA PRO &nbsp;·&nbsp; ▮▮▮ ▾ ▮</span>
  </div>

  <div class="screens" id="screens"><!-- screens injected --></div>

  <div class="nav" id="nav">
    <button data-go="dashboard" class="on"><span class="ico">⌂</span>Início</button>
    <button data-go="inventarios"><span class="ico">🔍</span>Pesquisar</button>
    <button data-go="contagem" class="mid"><span class="scan">▥</span></button>
    <button data-go="pendencias"><span class="ico">⚑</span>Pendências</button>
    <button data-go="mais"><span class="ico">☰</span>Mais</button>
  </div>
</div>
<script>
/* ====== DADOS (vazios — tudo vem do backend) ====== */
var INVS=[];
var ITENS=[];
var RES=[];

/* ====== HELPERS ====== */
function el(h){var d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;}
function bar(pct,st){var c=st==='fim'||pct>=100?'var(--ok)':pct<25?'var(--div)':'var(--pend)';return '<div class="prog"><i style="width:'+pct+'%;background:'+c+'"></i></div>';}
function back(t){return '<button class="ic" data-back>‹</button>';}

/* ====== TELAS ====== */
var APP_VERSION='v20 · 25/06 (url nova)';
var SCREENS={};

/* DASHBOARD */
SCREENS.dashboard=`
<section class="screen active" data-screen="dashboard">
  <div class="hdr"><div class="hdr-row"><div class="ic">☰</div><h1 class="display">Dashboard</h1><div class="spacer"></div><div class="ic">☁</div></div></div>
  <div class="greet">
    <div class="hi">Olá, Almoxarife! <span class="badge-on">● Online</span></div>
    <div class="sy">⟳ Última sincronização<br>📅 hoje, 16:32</div>
  </div>
  <div class="pad">
    <div class="sec-title">Visão geral</div>
    <div class="grid2 mb12">
      <div class="ov green"><div class="t"><span>Reservas</span>📋</div><div class="n">0</div><div class="l">Abertas</div></div>
      <div class="ov blue"><div class="t"><span>Inventários</span>📦</div><div class="n">0</div><div class="l">Em andamento</div></div>
      <div class="ov amber"><div class="t"><span>Pendências</span>⚠</div><div class="n">0</div><div class="l">Itens</div></div>
      <div class="ov red"><div class="t"><span>Ocorrências</span>❗</div><div class="n">0</div><div class="l">Abertas</div></div>
    </div>
    <div class="sec-title">Atalhos rápidos</div>
    <div class="qa mb12">
      <button data-go="inventarios"><div class="qi">📋</div><div class="ql">Iniciar Inventário</div></button>
      <button data-go="reservas"><div class="qi">📥</div><div class="ql">Reservas</div></button>
      <button data-go="contagem"><div class="qi">▥</div><div class="ql">Código de Barras</div></button>
      <button data-go="ocorrencias"><div class="qi">❗</div><div class="ql">Ocorrências</div></button>
      <button data-go="mapa"><div class="qi">📍</div><div class="ql">Mapa do Estoque</div></button>
      <button data-go="sync"><div class="qi">⟳</div><div class="ql">Sincronizar</div></button>
    </div>
    <div class="sec-title">Resumo da contagem (—)</div>
    <div class="card mb12" style="padding:6px 0">
      <div class="resline"><div class="lbl muted">Total no sistema</div><div class="val" style="color:var(--ink)">—</div></div>
      <div class="resline"><div class="lbl" style="color:var(--ok)">Conferidos</div><div class="val" style="color:var(--ok)">—</div></div>
      <div class="resline"><div class="lbl" style="color:var(--pend)">Pendentes</div><div class="val" style="color:var(--pend)">—</div></div>
      <div class="resline"><div class="lbl" style="color:var(--div)">Divergências</div><div class="val" style="color:var(--div)">—</div></div>
      <div class="resline"><div class="lbl" style="color:var(--g600)">Acuracidade</div><div class="val" style="color:var(--g600)">—</div></div>
    </div>
    <div class="sec-title">Ocorrências abertas</div>
    <div class="card">
      <div class="row"><div class="note">Nenhuma ocorrência aberta no momento.</div></div>
    </div>
  </div>
</section>`;

/* INVENTÁRIOS */
SCREENS.inventarios=`
<section class="screen" data-screen="inventarios">
  <div class="hdr"><div class="hdr-row">${back()}<h1 class="display">Inventários</h1><div class="spacer"></div><div class="ic">ⓧ</div></div></div>
  <div class="pad">
    <div class="tabs" data-tabs><button class="on">Todos</button><button>Em andamento</button><button>Finalizados</button></div>
    <div class="search">🔍<input placeholder="Buscar inventário..."></div>
    <div class="card" id="invList"></div>
    <button class="btn btn-primary mt12" data-go="contagem">＋ Novo inventário</button>
  </div>
</section>`;

/* CONTAGEM INTELIGENTE */
SCREENS.contagem=`
<section class="screen" data-screen="contagem">
  <div class="hdr"><div class="hdr-row">${back()}<div><h1 class="display">Contagem Inteligente</h1><div class="sub">—</div></div><div class="spacer"></div><div class="ic">⋮</div></div></div>
  <div class="pad">
    <div class="trio mb12">
      <div><div class="n" style="color:var(--ink)" id="ctTotal">—</div><div class="l">Total no sistema</div></div>
      <div><div class="n" style="color:var(--ok)" id="ctConf">—</div><div class="l">Conferido</div></div>
      <div><div class="n" style="color:var(--div)" id="ctFalta">—</div><div class="l">Faltando</div></div>
    </div>
    <div class="tabs" data-tabs="cont"><button class="on" data-pane="manual">Manual</button><button data-pane="agrup" data-go="agrupar">Agrupamento</button></div>
    <div class="card item mb12"><div class="thumb">▥</div><div><b style="font-size:14px" id="ctItem">Leia um código de barras</b><div class="note" id="ctCod">Selecione um item para contar</div></div></div>
    <div class="card pad" style="padding:14px">
      <div class="note mb8" style="font-weight:700;color:var(--ink2)">Contagem manual</div>
      <div class="counter">
        <button class="stepper" data-cnt="-">−</button>
        <div class="big"><b id="cntVal">0</b><span>PARES</span></div>
        <button class="stepper" data-cnt="+">＋</button>
      </div>
      <div class="keys" data-keys>
        <button>1</button><button>2</button><button>3</button>
        <button>4</button><button>5</button><button>6</button>
        <button>7</button><button>8</button><button>9</button>
        <button data-k="C">C</button><button>0</button><button data-k="del">⌫</button>
      </div>
    </div>
    <button class="btn btn-primary mt12" data-act="adicionarContagem"><span id="addLbl">Adicionar</span></button>
    <div class="sec-title mt12">Últimos itens conferidos</div>
    <div class="card" id="lastItems"></div>
  </div>
</section>`;

/* AGRUPAR POR EMBALAGEM */
SCREENS.agrupar=`
<section class="screen" data-screen="agrupar">
  <div class="hdr"><div class="hdr-row">${back()}<div><h1 class="display">Agrupar por Embalagem</h1><div class="sub">Item selecionado</div></div><div class="spacer"></div><div class="ic">⋮</div></div></div>
  <div class="pad">
    <div class="trio mb12">
      <div><div class="n" style="color:var(--ink)" id="agItens">0</div><div class="l">Itens/embalagem</div></div>
      <div><div class="n" style="color:var(--ink)" id="agQtd">0</div><div class="l">Embalagens</div></div>
      <div><div class="n" style="color:var(--g600)" id="agTot">0</div><div class="l">Total (PARES)</div></div>
    </div>
    <div class="card pad" style="padding:15px">
      <div class="note mb8" style="font-weight:700;color:var(--ink2)">Tipo de embalagem</div>
      <div class="chips" data-chips><button class="on">SACO</button><button>CAIXA</button><button>PACOTE</button><button>OUTRO</button></div>
      <div class="note mb8" style="font-weight:700;color:var(--ink2)">Itens por embalagem (pares)</div>
      <div class="steprow"><button class="stepbtn" data-ag="i-">−</button><div class="v"><b id="agItens2">0</b><span>PARES</span></div><button class="stepbtn" data-ag="i+">＋</button></div>

/* listas dinâmicas */
function rendInvRows(list){var box=document.getElementById('invList');if(!box)return;
  if(!list||!list.length){box.innerHTML='<div class="row"><div class="note">Nenhum inventário encontrado.</div></div>';return;}
  box.innerHTML=list.map(function(i){var c=i.pct>=100?'ok':i.pct<25?'div':'pend';
   return '<div class="row" data-go="contagem" data-token="'+(i.token||'')+'"><div style="flex:1"><div class="flexb"><b style="font-size:14px">'+(i.os||i.titulo||i.token)+'</b><b class="pill '+c+'">'+i.feito+'/'+i.total+'</b></div><div class="note">Obra: '+(i.obra||'')+' · '+i.pct+'%</div>'+bar(i.pct,(i.status==='FINALIZADO'||i.pct>=100)?'fim':'')+'</div></div>';}).join('');}
function fillContagem(){
  var t=document.getElementById('ctTotal');if(!t)return;
  if(typeof getUrl!=='function'||!getUrl()||!window._tokenSel){ return; }
  document.getElementById('ctItem').textContent='Carregando...';
  apiJsonp('itensTokenApp',{token:window._tokenSel},function(r){
    if(!r||!r.ok){ document.getElementById('ctItem').textContent='Não consegui carregar os itens.'; return; }
    var s=r.stats||{};
    document.getElementById('ctTotal').textContent=s.total||0;
    document.getElementById('ctConf').textContent=s.conferido||0;
    document.getElementById('ctFalta').textContent=s.faltando||0;
    var pend=(r.itens||[]).filter(function(x){return x.f===0;})[0]||(r.itens||[])[0];
    if(pend){ window._itemAtual=pend; document.getElementById('ctItem').textContent=pend.nm; document.getElementById('ctCod').textContent='Código: '+pend.cod; }
    else { window._itemAtual=null; document.getElementById('ctItem').textContent='Sem itens neste inventário'; document.getElementById('ctCod').textContent=''; }
    ITENS=r.itens||[]; fillLast();
  });
}
function fillInv(){var box=document.getElementById('invList');if(!box)return;
  if(typeof getUrl!=='function'||!getUrl()){ rendInvRows(INVS); return; }
  box.innerHTML='<div class="row"><div class="note">Carregando inventários...</div></div>';
  apiJsonp('listarInventariosApp',{},function(r){
    if(r&&r.ok&&r.data){ rendInvRows(r.data); }
    else{ box.innerHTML='<div class="row"><div class="note" style="color:var(--div)">Não consegui carregar. Confira a URL em Sincronização → Testar conexão.</div></div>'; }
  });
}
function fillRes(){var box=document.getElementById('resList');if(!box)return;if(!RES.length){box.innerHTML='<div class="row"><div class="note">Nenhuma reserva ainda. Crie uma em “Nova reserva”.</div></div>';return;}box.innerHTML=RES.map(function(r){
  return '<div class="row" data-go="reservaDet"><div style="flex:1"><div class="flexb"><b style="font-size:14px">'+r.os+'</b><span class="pill '+r.stc+'">'+r.st+'</span></div><div class="note">'+r.obra+' · '+r.itens+' itens · '+r.pct+'%</div>'+bar(r.pct)+'</div></div>';
}).join('');}
function fillLast(){var box=document.getElementById('lastItems');if(!box)return;if(!ITENS.length){box.innerHTML='<div class="row"><div class="note">Nenhum item conferido ainda.</div></div>';return;}box.innerHTML=ITENS.map(function(i){
  var c=i.f>=i.t&&i.t>0?'ok':i.f===0?'div':'pend';var ic=i.f>=i.t&&i.t>0?'✓':'○';
  return '<div class="row" data-pick-cod="'+i.cod+'" style="cursor:pointer"><span class="icirc '+c+'">'+ic+'</span><div style="flex:1"><b style="font-size:13px">'+i.nm+'</b></div><b style="color:var(--'+c+')">'+i.f+'/'+i.t+'</b></div>';
}).join('');}
function fillResItens(){var box=document.getElementById('resItens');if(!box)return;if(!ITENS.length){box.innerHTML='<div class="row"><div class="note">Sem itens nesta reserva.</div></div>';return;}box.innerHTML=ITENS.map(function(i){
  var c=i.f>=i.t?'ok':i.f===0?'div':'pend';var ic=i.f>=i.t?'✓':'○';
  return '<div class="row"><span class="thumb">📦</span><div style="flex:1"><b style="font-size:13px">'+i.nm+'</b><div class="code">Código: '+i.cod+' · Qtd: '+i.t+'</div></div><b style="color:var(--'+c+')">'+i.f+'/'+i.t+'</b></div>';
}).join('');}

var stack=['dashboard'];
function go(name){
  var scs=document.querySelectorAll('.screen');var found=false;
  scs.forEach(function(s){var on=s.getAttribute('data-screen')===name;s.classList.toggle('active',on);if(on)found=true;});
  if(!found)return;
  if(stack[stack.length-1]!==name)stack.push(name);
  // nav highlight
  document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-go')===name);});
  // refresh dynamic
  fillInv();fillRes();fillLast();fillResItens();
  if(name==='contagem')fillContagem();
  if(name==='reservas')loadReservas();
  if(name==='sync'){var cu=document.getElementById('cfgUrl');if(cu&&!cu.value)cu.value=getUrl();var av=document.getElementById('appVer');if(av)av.textContent=APP_VERSION;}
  document.querySelector('.phone').scrollTo&&window.scrollTo(0,0);
}
function goBack(){ if(stack.length>1){stack.pop();go(stack[stack.length-1]);stack.pop();} else go('dashboard'); }

/* ====== CONEXÃO COM O SCRIPT (Apps Script /exec) ====== */
var URL_PADRAO='https://script.google.com/macros/s/AKfycbwyw4bWeKk1VJTTct9F7PXp74AkoHdfxkCs-EnBcZ3LNehotzZdLtM3EsgJkGU9AvXldA/exec';
function getUrl(){ try{return localStorage.getItem('almoxa_exec_url')||URL_PADRAO;}catch(e){return URL_PADRAO;} }
function setUrl(u){ try{localStorage.setItem('almoxa_exec_url',u);}catch(e){} }

/* chamada genérica JSONP ao Apps Script (via payload do doGet) */
function apiJsonp(action,extra,done){
  var url=getUrl(); if(!url){ done&&done(null); return; }
  var cb='almoxa_'+Date.now()+Math.floor(Math.random()*9999);
  var s=document.createElement('script');
  var to=setTimeout(function(){ clean(); done&&done(null); },20000);
  function clean(){ try{delete window[cb];}catch(e){} if(s&&s.parentNode)s.parentNode.removeChild(s); }
  window[cb]=function(resp){ clearTimeout(to); clean(); done&&done(resp); };
  s.onerror=function(){ clearTimeout(to); clean(); done&&done(null); };
  var payload=encodeURIComponent(JSON.stringify(Object.assign({action:action},extra||{})));
  s.src=url+(url.indexOf('?')<0?'?':'&')+'payload='+payload+'&callback='+cb;
  document.body.appendChild(s);
}

/* limpa a URL: tira espaços, corrige /dev->/exec, corta lixo depois de /exec */
function normUrl(u){
  u=String(u||'').replace(/[\u200B-\u200D\uFEFF]/g,'').trim().replace(/\s+/g,'');
  u=u.replace(/\/dev(\?|#|$)/,'/exec$1');
  var i=u.indexOf('/exec'); if(i>=0) u=u.slice(0,i+5);
  return u;
}

function salvarUrl(){
  var inp=document.getElementById('cfgUrl'),msg=document.getElementById('cfgMsg');
  var url=normUrl(inp.value);
  if(!url){ msg.innerHTML='<span style="color:var(--div)">Cole a URL /exec primeiro.</span>'; return; }
  if(url.indexOf('/exec')<0){ msg.innerHTML='<span style="color:var(--pend)">Atenção: a URL precisa terminar em <b>/exec</b> (não use a /dev).</span>'; return; }
  setUrl(url); inp.value=url;
  msg.innerHTML='<span style="color:var(--ok)">✓ URL salva e limpa. Agora toque em "Testar conexão".</span>';
}

function testarConexao(){
  var msg=document.getElementById('cfgMsg');
  var inp=document.getElementById('cfgUrl');
  var url=normUrl((inp&&inp.value)||getUrl());
  if(!url){ msg.innerHTML='<span style="color:var(--div)">Cole e salve a URL /exec primeiro.</span>'; return; }
  if(url.indexOf('/exec')<0){ msg.innerHTML='<span style="color:var(--pend)">A URL precisa terminar em <b>/exec</b>. Pegue a URL nova em Implantar → Gerenciar implantações.</span>'; return; }
  setUrl(url); if(inp)inp.value=url;
  msg.innerHTML='Testando conexão... <span style="color:var(--t3,#888)">(a 1ª vez pode demorar uns segundos)</span>';
  _pingTry(url,msg,2);
}
/* tenta o ping; se falhar (cold start), tenta de novo antes de desistir */
function _pingTry(url,msg,tentativas){
  var cb='almoxaping_'+Date.now()+Math.floor(Math.random()*999);
  var s=document.createElement('script');
  function cleanup(){ try{delete window[cb];}catch(e){} if(s&&s.parentNode)s.parentNode.removeChild(s); }
  function falhou(motivo){
    if(tentativas>0){ msg.innerHTML='Ainda testando... <span style="color:var(--t3,#888)">tentando de novo</span>'; setTimeout(function(){ _pingTry(url,msg,tentativas-1); },900); }
    else if(motivo==='timeout'){ msg.innerHTML='<span style="color:var(--div)">Sem resposta após várias tentativas. Confira se a URL é a da implantação <b>atual</b> (cada implantação nova gera uma URL nova) e se está como <b>"Qualquer pessoa"</b>.</span>'; }
    else{ msg.innerHTML='<span style="color:var(--div)">Não carregou. A URL no celular pode ser de uma implantação <b>antiga</b>. Copie a URL <b>nova</b> em Implantar → Gerenciar implantações e cole aqui.</span>'; }
  }
  var to=setTimeout(function(){ cleanup(); falhou('timeout'); },20000);
  window[cb]=function(resp){ clearTimeout(to); cleanup();
    if(resp&&resp.ok){ msg.innerHTML='<span style="color:var(--ok)">✓ Conexão OK — API '+(resp.versaoApi||'?')+' · sistema online.</span>'; setUrl(url); }
    else{ msg.innerHTML='<span style="color:var(--pend)">Conectou, mas a resposta veio inesperada. Republicar a versão costuma resolver.</span>'; } };
  s.onerror=function(){ clearTimeout(to); cleanup(); falhou('erro'); };
  s.src=url+(url.indexOf('?')<0?'?':'&')+'action=ping&callback='+cb;
  document.body.appendChild(s);
}

function sincronizar(){
  var w=document.getElementById('syncWhen');
  if(!getUrl()){ var m=document.getElementById('cfgMsg'); if(m)m.innerHTML='<span style="color:var(--pend)">Salve e teste a URL antes de sincronizar.</span>'; return; }
  if(w){var d=new Date();w.textContent='hoje, '+(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();}
}

/* ===== RESERVAS ===== */
var _resBuscaTimer=null;
function buscarItensReserva(termo){
  var out=document.getElementById('resBuscaOut'); if(!out)return;
  if(!getUrl()){ out.innerHTML='<div class="row"><div class="note" style="color:var(--pend)">Configure a conexão em Sincronização.</div></div>'; return; }
  if(!termo||termo.trim().length<2){ out.innerHTML='<div class="row"><div class="note">Digite ao menos 2 letras.</div></div>'; return; }
  clearTimeout(_resBuscaTimer);
  _resBuscaTimer=setTimeout(function(){
    out.innerHTML='<div class="row"><div class="note">Buscando...</div></div>';
    apiJsonp('buscarItensReserva',{termo:termo.trim()},function(r){
      if(!r||!r.ok){ out.innerHTML='<div class="row"><div class="note" style="color:var(--div)">Erro na busca.</div></div>'; return; }
      if(!r.itens||!r.itens.length){ out.innerHTML='<div class="row"><div class="note">Nenhum item inventariado encontrado.</div></div>'; return; }
      window._resLista=r.itens;
      out.innerHTML=r.itens.map(function(i){
        return '<div class="row" data-resp-cod="'+i.cod+'" style="cursor:pointer"><span class="thumb">📦</span><div style="flex:1"><b style="font-size:13px">'+i.nm+'</b><div class="code">Cód: '+i.cod+(i.local?' · Local: '+i.local:'')+'</div></div><b style="color:var(--g600)">R$ '+(i.vu||0).toFixed(2)+'</b></div>';
      }).join('');
    });
  },350);
}
document.addEventListener('click',function(e){
  var p=e.target.closest('[data-resp-cod]'); if(!p)return;
  var cod=p.getAttribute('data-resp-cod');
  var it=(window._resLista||[]).filter(function(x){return String(x.cod)===String(cod);})[0];
  if(!it)return;
  window._resItem=it;
  document.getElementById('resSelNm').textContent=it.nm;
  document.getElementById('resSelInfo').textContent='Cód: '+it.cod+(it.local?' · Local: '+it.local:'')+' · Valor: R$ '+(it.vu||0).toFixed(2);
  document.getElementById('resSelCard').style.display='block';
  var q=document.getElementById('resQtd'); if(q){q.value='';q.focus();}
});
var _resQtdItens=0;
function salvarReserva(){
  var it=window._resItem;
  var nome=(document.getElementById('resNome').value||'').trim();
  if(!nome){ alert('Dê um nome para a reserva (ex: Três Lagoas).'); return; }
  if(!it){ alert('Selecione um item.'); return; }
  var q=parseInt(document.getElementById('resQtd').value||'0',10);
  if(!q||q<=0){ alert('Informe a quantidade.'); return; }
  apiJsonp('criarReservaApp',{
    reserva:nome, codigoMaterial:it.cod, descricao:it.nm, quantidade:q,
    local:it.local||'', valorUnitario:it.vu||0, solicitante:'App'
  },function(r){
    if(r&&r.ok){
      _resQtdItens++;
      document.getElementById('resCount').textContent='✓ '+_resQtdItens+' item(ns) na reserva "'+nome+'". Adicione mais ou toque em Concluir.';
      window._resItem=null;
      document.getElementById('resSelCard').style.display='none';
      var bi=document.getElementById('resBuscaInp'); if(bi){bi.value='';bi.focus();}
      document.getElementById('resBuscaOut').innerHTML='<div class="row"><div class="note">Digite o próximo item.</div></div>';
    } else alert('Não consegui adicionar. Confira a conexão (Diagnóstico).');
  });
}
function loadReservas(){
  var box=document.getElementById('resList'); if(!box)return;
  _resQtdItens=0;
  if(!getUrl()){ box.innerHTML='<div class="row"><div class="note">Configure a conexão em Sincronização.</div></div>'; return; }
  box.innerHTML='<div class="row"><div class="note">Carregando...</div></div>';
  apiJsonp('listarReservasAgrupado',{},function(r){
    if(!r||!r.ok||!r.grupos||!r.grupos.length){ box.innerHTML='<div class="row"><div class="note">Nenhuma reserva ainda. Crie em “Nova reserva”.</div></div>'; return; }
    box.innerHTML=r.grupos.map(function(g){
      var itensHtml=g.itens.map(function(x){
        return '<div class="row" style="padding-left:8px"><div style="flex:1"><b style="font-size:12px">'+x.nm+'</b><div class="code">Qtd: '+x.qtd+(x.local?' · Local: '+x.local:'')+' · R$ '+(x.total||0).toFixed(2)+'</div></div></div>';
      }).join('');
      return '<div style="border:1px solid var(--line,#e3ece7);border-radius:14px;margin-bottom:10px;overflow:hidden">'
        +'<div class="row" style="background:var(--g100,#e7f3ec)"><div style="flex:1"><b style="font-size:14px">📋 Reserva '+g.reserva+'</b><div class="note">'+g.totalItens+' item(ns) · Total R$ '+(g.valorTotal||0).toFixed(2)+'</div></div></div>'
        +itensHtml+'</div>';
    }).join('');
  });
}

function adicionarContagem(){
  var it=window._itemAtual;
  if(!getUrl()){ alert('Configure a conexão em Sincronização.'); return; }
  if(!window._tokenSel){ alert('Abra um inventário primeiro.'); return; }
  if(!it){ alert('Nenhum item selecionado para contar.'); return; }
  var cnt=(typeof window._getCnt==='function')?window._getCnt():parseInt(document.getElementById('cntVal').textContent||'0',10);
  var btn=document.querySelector('[data-act="adicionarContagem"] #addLbl');
  if(btn)btn.textContent='Salvando...';
  apiJsonp('lancarItemToken',{
    token: window._tokenSel,
    codigoMaterial: it.cod,
    descricao: it.nm,
    quantidadeContada: cnt,
    quantidadeSap: it.t,
    valorUnitario: it.vu||0,
    lancadoPor:'Coletor'
  },function(r){
    if(r&&r.ok){
      if(window._setCnt)window._setCnt(0);
      fillContagem(); // recarrega contadores e próximo item
    } else {
      alert('Não consegui salvar. Confira a conexão (Diagnóstico).');
      if(btn)btn.textContent='Adicionar';
    }
  });
}

function rodarDiagnostico(){
  var out=document.getElementById('diagOut'); if(!out)return;
  if(!getUrl()){ out.innerHTML='<div class="card pad" style="padding:16px"><div class="note" style="color:var(--pend)">Configure a URL em Sincronização primeiro.</div></div>'; return; }
  out.innerHTML='<div class="card pad" style="padding:16px"><div class="note">Testando comunicação...</div></div>';
  var t0=Date.now();
  apiJsonp('diagnosticoApp',{},function(r){
    var ms=Date.now()-t0;
    if(!r||!r.ok){ out.innerHTML='<div class="card pad" style="padding:16px"><div class="note" style="color:var(--div)">Sem comunicação com o sistema. Confira a conexão em Sincronização.</div></div>'; return; }
    var reg=r.registros||{},mods=r.modulos||{};
    function lin(l,v,c){return '<div class="resline"><div class="lbl">'+l+'</div><div class="val" style="color:'+(c||'var(--ink)')+'">'+v+'</div></div>';}
    var h='<div class="card mb12">'
      +lin('Status','✓ Online','var(--ok)')
      +lin('Tempo de resposta',ms+' ms',ms<1500?'var(--ok)':'var(--pend)')
      +lin('Planilha',r.planilha||'—')
      +lin('Última atualização',r.timestamp||'—')
      +lin('Versão API',r.versaoApi||'—')
      +'</div>';
    h+='<div class="sec-title">Registros nas abas</div><div class="card mb12">';
    Object.keys(reg).forEach(function(k){ h+=lin(k, reg[k].existe?reg[k].registros:'(não existe)', reg[k].existe?'var(--ink)':'var(--div)'); });
    h+='</div><div class="sec-title">Módulos carregados</div><div class="card">';
    Object.keys(mods).forEach(function(k){ h+=lin(k, mods[k]?'✓ OK':'✗ ausente', mods[k]?'var(--ok)':'var(--div)'); });
    h+='</div>';
    out.innerHTML=h;
  });
}

go('dashboard');
