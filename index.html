/* --- Assinatura canvas --- */
function initCanvas() {
  var c = document.getElementById('sigCanvas');
  if (!c) return;
  var ctx = c.getContext('2d');
  ctx.strokeStyle = '#14241B';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  var drawing = false, lx, ly;
  function getPos(e) {
    var r = c.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left) * (c.width / r.width), y: (src.clientY - r.top) * (c.height / r.height) };
  }
  c.addEventListener('mousedown', function (e) { drawing = true; var p = getPos(e); lx = p.x; ly = p.y; });
  c.addEventListener('mousemove', function (e) {
    if (!drawing) return;
    var p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
    lx = p.x; ly = p.y;
  });
  c.addEventListener('mouseup', function () { drawing = false; });
  c.addEventListener('touchstart', function (e) { e.preventDefault(); drawing = true; var p = getPos(e); lx = p.x; ly = p.y; }, { passive: false });
  c.addEventListener('touchmove', function (e) {
    e.preventDefault();
    if (!drawing) return;
    var p = getPos(e);
    ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(p.x, p.y); ctx.stroke();
    lx = p.x; ly = p.y;
  }, { passive: false });
  c.addEventListener('touchend', function () { drawing = false; });
}
function clearSig() { var c = document.getElementById('sigCanvas'); if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height); }
function confirmarAssinatura() { alert('✓ Assinatura registrada!'); goBack(); }

document.addEventListener('click', function (e) {
  // nav buttons
  var nav = e.target.closest('.nav-btn');
  if (nav && nav.dataset.go) { go(nav.dataset.go); return; }

  // go links
  var goEl = e.target.closest('[data-go]');

  // back
  if (e.target.closest('[data-back]')) { goBack(); return; }

  // contagem item click
  var contItem = e.target.closest('.item-cont[data-item-idx]');
  if (contItem) {
    var idx = parseInt(contItem.getAttribute('data-item-idx'), 10);
    abrirContagemItem(idx);
    return;
  }

  // inventário item click
  var invItem = e.target.closest('.inv-item[data-inv-token]');
  if (invItem) {
    var tok = invItem.getAttribute('data-inv-token');
    var inv = _invIndex[tok] || { token: tok, titulo: tok, obra: '' };
    abrirInventario(inv);
    return;
  }

  // search item select
  var resRow = e.target.closest('[data-res-cod]');
  if (resRow) {
    var cod = resRow.getAttribute('data-res-cod');
    var it = (window._resLista || []).find(function (x) { return String(x.cod) === String(cod); });

function onScreenActivated(id) {
  if (id === 'configuracoes') setTimeout(cfInit, 30);
  if (id === 'mais') {
    var nome = localStorage.getItem('almv25_nome') || 'Usuário';
    var obra = State.obra || localStorage.getItem('almv25_obra') || '';
    var tok  = State.token || localStorage.getItem('almv25_token') || '';
    var el;
    el = document.getElementById('maisNomeUser'); if(el) el.textContent = nome;
    el = document.getElementById('maisObraUser');
    if(el) el.textContent = (obra ? 'Obra: ' + obra : '') + (tok ? ' · Token: ' + tok : '');
  }
  if (id === 'conexaoApi') setTimeout(initConexaoApi, 30);
  if (id !== 'scanner') pararCamera();
  if (id === 'scanner') {
    var sc = document.getElementById('scanResult');
    if (sc) sc.style.display = 'none';
    var code = document.getElementById('scanCode');
    if (code) code.textContent = 'Aponte para o código de barras';
  }
  if (id === 'relatorio') setTimeout(gerarRelatorio, 100);
  if (id === 'mapa') setTimeout(buildMapa, 30);
  if (id === 'assinatura') setTimeout(initCanvas, 80);
  if (id === 'sincronizacao') setTimeout(loadSyncStatus, 30);
  if (id === 'dashboard') setTimeout(loadDashboard, 30);
}

function mostrarResumoConferencias() {
  var conf = getConfAtual();
  var hist = getHistorico();

  var contados = itens.filter(function(it) {
    var h = hist[it.cod] || {};

  var divergentes = itens.filter(function(it) {
    var h = hist[it.cod] || {};
    var c1 = h.conf1 !== undefined ? h.conf1 : it.c;
    var c2 = h.conf2;
    if (conf >= 2 && c1 !== undefined && c2 !== undefined) return c1 !== c2;
    if (conf === 1) {

      return qtdC !== undefined && qtdC !== it.t;
    }

function iniciarProxConferencia() {
  var conf = getConfAtual();
  var hist = getHistorico();
  
  // Filtra só divergentes
  var divergentes = (_itensInv || []).filter(function(it) {
    var h = hist[it.cod] || {};
    var c1 = h.conf1 !== undefined ? h.conf1 : it.c;
    var c2 = h.conf2;
    if (conf === 1) return c1 !== undefined && c1 !== it.t;
    if (conf === 2 && c1 !== undefined && c2 !== undefined) return c1 !== c2;
    return true;
  });

  setConfAtual(conf + 1);
  var novaConf = conf + 1;
  _itensInv = divergentes;

  var old2 = document.getElementById('modalResumoConf');
  if (old2) old2.remove();

  // Mostra tela de nova conferência
  mostrarTelaConferencia(novaConf, divergentes);
}

var _salvarOriginal = salvarContagemItem;
salvarContagemItem = function() {
  var info = window._itemContAtual;
  if (!info) return;
  var it  = info.it;
  var idx = info.idx;
  var qtd = parseInt(window._modalCntStr || '0', 10);
  var conf = getConfAtual();
  var tok = State.token || localStorage.getItem('almv25_token') || '';
  var lancadoPor  = (document.getElementById('modalContador')||{}).value || localStorage.getItem('almv25_nome') || 'App';
  var indicadorIt = (document.getElementById('modalItIndicador')||{}).value || '';
  
  if (lancadoPor) localStorage.setItem('almv25_nome', lancadoPor);

  if (!getUrl()) { alert('Configure a URL da API.'); return; }
  if (!tok)      { alert('Carregue o inventário primeiro.'); return; }

  var btn = document.querySelector('#modalContagem button:last-child');
  if (btn) btn.textContent = 'Salvando...';

  // Salva histórico local
  var hist = getHistorico();
  if (!hist[it.cod]) hist[it.cod] = {};
  hist[it.cod]['conf'+conf] = qtd;
  hist[it.cod]['op'+conf] = lancadoPor;
  setHistorico(hist);

  apiJsonp('lancarItemToken', {
    token:             tok,
    codigoMaterial:    it.cod,
    descricao:         it.nm || '',
    quantidadeContada: qtd,
    quantidadeSap:     it.t  || 0,
    valorUnitario:     it.vu || 0,
    unidade:           it.un || 'UN',
    local:             it.local || '',
    lancadoPor:        lancadoPor + ' ('+conf+'ªConf)',
    indicadorIt:       indicadorIt,
    numeroConferencia: conf
  }, function(r) {
    if (r && r.ok) {
      _itensInv[idx].c   = qtd;
      _itensInv[idx].dif = qtd - (it.t || 0);
      fecharModal();
      // Atualiza tela de conferência se estiver aberta
      var telaConf = document.getElementById('telaConferencia');
      if (telaConf) {
        mostrarTelaConferencia(getConfAtual(), _itensInv);
      } else {
        renderIndicadores(_itensInv);
      }
    } else {
      if (btn) btn.textContent = '✓ Confirmar Contagem';
      alert('Erro ao salvar. Verifique a conexão.');
    }
  });
};

// Substitui abrirContagemItem pelo que mostra histórico
var _abrirOriginal = abrirContagemItem;
abrirContagemItem = function(idx) {
  var conf = getConfAtual();

    + '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">'
    + '<div style="width:180px;height:100px;border:2px solid rgba(26,159,255,.8);border-radius:8px"></div>'
    + '</div>'
    + '</div>'
    + '<div style="padding:14px 16px">'
    + '<div id="scanInvStatus" style="text-align:center;font-size:12px;color:#888;margin-bottom:10px">Aponte para o código de barras do item</div>'
    + '<div style="display:flex;gap:8px">'
    + '<input id="scanInvInput" placeholder="Ou digite o codigo..." style="flex:1;border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 13px;font-size:14px;outline:none">'
    + '<button id="scanInvOkBtn" style="padding:10px 14px;background:#1a9fff;border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer">OK</button>'
    + '</div>'
    + '</div>'
    + '</div>';

  document.body.appendChild(m);
  var _si=document.getElementById('scanInvInput');
  if(_si)_si.onkeyup=function(e){if(e.keyCode===13&&this.value.trim()){processarScanInv(this.value.trim());this.value='';}};
  var _ok=document.getElementById('scanInvOkBtn');
  if(_ok)_ok.onclick=function(){var v=_si?_si.value.trim():'';if(v){processarScanInv(v);if(_si)_si.value='';};};

  // Inicia câmera
  var video = document.getElementById('scanInvVideo');
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(function(stream) {
      window._scanInvStream = stream;
      video.srcObject = stream;
      video.play();
      _loopScanInv();
    })
    .catch(function() {
      document.getElementById('scanInvStatus').textContent = 'Câmera indisponível — use o campo abaixo';
    });
}

function fecharScannerInv() {
  if (window._scanInvFrame) { cancelAnimationFrame(window._scanInvFrame); window._scanInvFrame = null; }
  if (window._scanInvStream) { window._scanInvStream.getTracks().forEach(function(t){ t.stop(); }); window._scanInvStream = null; }
  var m = document.getElementById('modalScanInv');
  if (m) m.remove();
}

function _loopScanInv() {
  var video = document.getElementById('scanInvVideo');
  if (!video || !window._scanInvStream) return;

  // Tenta ZXing primeiro (funciona em qualquer navegador)
  if (window.ZXing && window.ZXing.BrowserMultiFormatReader) {
    var reader = new ZXing.BrowserMultiFormatReader();
    reader.decodeFromVideoElement(video).then(function(result) {
      if (result) {
        fecharScannerInv();
        processarScanInv(result.getText());
      }
    }).catch(function() {
      window._scanInvFrame = requestAnimationFrame(_loopScanInv);
    });
    return;
  }

  // Fallback: BarcodeDetector nativo
  if (window.BarcodeDetector) {
    var canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    var bd = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','qr_code','upc_a'] });
    bd.detect(canvas).then(function(barcodes) {
      if (barcodes.length > 0) {
        fecharScannerInv();
        processarScanInv(barcodes[0].rawValue);
        return;
      }
      window._scanInvFrame = requestAnimationFrame(_loopScanInv);
    }).catch(function() {
      window._scanInvFrame = requestAnimationFrame(_loopScanInv);
    });
  } else {
    // Sem suporte — usa campo manual
    var st = document.getElementById('scanInvStatus');
    if (st) st.textContent = 'Use o campo abaixo para digitar o codigo';
  }
}

function processarScanInv(cod) {
  if (!cod) return;
  fecharScannerInv();

  // Busca item no inventário
  var item = null;
  var idx  = -1;
  for (var i = 0; i < (_itensInv || []).length; i++) {
    var it = _itensInv[i];
    if (String(it.cod || '').toUpperCase() === cod.toUpperCase()) {
      item = it; idx = i; break;
    }
  }

  if (item) {
    // Encontrou — abre modal de contagem
    setTimeout(function() { abrirContagemItem(idx); }, 200);
  } else {
    alert('Código ' + cod + ' não encontrado neste inventário.');
  }
}


function finalizarInventarioManual() {
  var tok = State.token || localStorage.getItem('almv25_token') || '';
  if (!tok) { alert('Nenhum inventario carregado.'); return; }
  if (!confirm('Marcar inventario ' + tok + ' como FINALIZADO?\nEle ira para a aba Finalizados.')) return;

  apiJsonp('finalizarInventarioStatus', { token: tok, status: 'FINALIZADO' }, function(r) {
    if (r && r.ok) {
      alert('Inventario marcado como Finalizado!');
      loadInventarios();
      go('inventarios');
    } else {
      // Fallback: salva localmente
      try {
        var fins = JSON.parse(localStorage.getItem('almv25_finalizados') || '[]');
        if (fins.indexOf(tok) < 0) fins.push(tok);
        localStorage.setItem('almv25_finalizados', JSON.stringify(fins));
      } catch(e) {}
      alert('Marcado localmente como finalizado!');
      go('inventarios');
    }
  });
}
</script>
