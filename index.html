<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ALMOXA PRO V25</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ALMOXA PRO V25 — DESIGN SYSTEM
   ============================================================ */
:root{
  /* Greens */
  --g900:#0D2E1A; --g800:#144023; --g700:#1B562F; --g600:#1E6B45;
  --g500:#259A5E; --g400:#2DBF72; --g300:#52D48A; --g050:#E8F5EE; --g025:#F4FAF6;

  /* Surfaces */
  --bg:#EEF3F0; --card:#FFFFFF; --ink:#14241B; --ink2:#354D3F; --ink3:#5E7569;
  --line:#DDE8E2; --line2:#C9DDD3;

  /* Semantics */
  --ok:#1E9A5A;     --okbg:#E6F5ED;
  --warn:#D09010;   --warnbg:#FDF3DC;
  --err:#D93F3C;    --errbg:#FDEAEA;
  --blue:#1A7FD4;   --bluebg:#E5F0FB;
  --purple:#7B54C4; --purplebg:#F0EBF9;
  --orange:#E06520; --orangebg:#FDF0E8;

  /* Radii & shadows */
  --r:14px; --r2:10px; --r3:8px;
  --sh:0 1px 4px rgba(14,44,26,.05),0 6px 20px rgba(14,44,26,.06);
  --sh2:0 2px 12px rgba(14,44,26,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{min-height:100vh}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:#091409;
  display:flex;justify-content:center;align-items:flex-start;
}
.display{font-family:'Syne','Inter',sans-serif;font-weight:800;letter-spacing:-.02em}

/* ============================================================
   PHONE FRAME
   ============================================================ */
.phone{
  width:100%;max-width:430px;min-height:100vh;height:100vh;
  background:var(--bg);position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
@media(min-width:460px){.phone{height:calc(100vh - 32px);min-height:600px;margin:16px 0;border-radius:32px;box-shadow:0 0 80px rgba(0,0,0,.6)}}

/* ============================================================
   STATUS BAR
   ============================================================ */
.sbar{
  height:28px;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;font-size:11.5px;font-weight:700;color:#fff;
  background:var(--g700);flex-shrink:0;
}
.sbar .right{display:flex;gap:6px;align-items:center;font-size:11px}

/* ============================================================
   SCREENS & NAVIGATION
   ============================================================ */
.screens{flex:1;overflow:hidden;position:relative;min-height:0}
.screen{display:none;position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;background:var(--bg)}
.screen.active{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Bottom Nav */
.nav{
  background:#fff;border-top:1px solid var(--line);
  display:flex;justify-content:space-around;align-items:center;
  padding:6px 4px 12px;z-index:100;flex-shrink:0;
}
.nav-btn{
  background:none;border:none;display:flex;flex-direction:column;
  align-items:center;gap:3px;font-size:9.5px;font-weight:700;color:var(--ink3);
  cursor:pointer;font-family:inherit;flex:1;padding:4px 2px;letter-spacing:.02em;
}
.nav-btn.active{color:var(--g600)}
.nav-ico{font-size:17px;line-height:1}
.nav-scan{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(145deg,var(--g500),var(--g700));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-top:-20px;
  box-shadow:0 6px 18px rgba(30,107,69,.45);border:3px solid var(--bg);
}

/* ============================================================
   LAYOUT HELPERS
   ============================================================ */
.pad{padding:14px 16px}
.pad-x{padding:0 16px}
.mb4{margin-bottom:4px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.flex{display:flex;align-items:center}.flexb{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}.gap12{gap:12px}.f1{flex:1}
.row-sep{height:1px;background:var(--line);margin:0}
.sec-title{font-size:11px;font-weight:800;letter-spacing:.07em;color:var(--ink3);text-transform:uppercase;margin:14px 16px 8px}

/* ============================================================
   HEADER
   ============================================================ */
.hdr{
  background:linear-gradient(150deg,var(--g700) 0%,var(--g600) 100%);
  color:#fff;padding:12px 16px 14px;flex-shrink:0;
}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr h1{font-size:17px;font-weight:700;line-height:1.1;flex:1}
.hdr .sub{font-size:11px;opacity:.78;margin-top:2px}
.hdr-icon{
  width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.14);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;border:none;color:#fff;cursor:pointer;flex-shrink:0;
}
.greet{
  background:linear-gradient(150deg,var(--g700) 0%,var(--g600) 100%);
  color:#fff;padding:0 16px 18px;
}
.greet-name{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
.online-pill{
  font-size:10px;font-weight:700;background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.25);padding:3px 9px;border-radius:20px;
  display:inline-flex;gap:5px;align-items:center;
}
.greet-obra{font-size:12px;opacity:.8;margin-top:5px}

/* ============================================================
   CARDS
   ============================================================ */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh)}
.card-body{padding:14px}

/* Overview grid */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ov{padding:13px 14px;border-radius:var(--r);cursor:pointer;border:1px solid transparent}
.ov .ov-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;font-size:11px;font-weight:700;color:var(--ink3)}
.ov .n{font-size:28px;font-weight:900;font-family:'Syne',sans-serif;line-height:1}
.ov .l{font-size:11px;font-weight:500;margin-top:3px;opacity:.75}
.ov.g{background:linear-gradient(150deg,#fff,#F0FAF5);border-color:#D0E8DA} .ov.g .n{color:var(--g600)}
.ov.b{background:linear-gradient(150deg,#fff,#EDF5FD);border-color:#CCDFF0} .ov.b .n{color:var(--blue)}
.ov.a{background:linear-gradient(150deg,#fff,#FDF7E8);border-color:#EDE0BF} .ov.a .n{color:var(--warn)}
.ov.r{background:linear-gradient(150deg,#fff,#FDF0F0);border-color:#EDDADA} .ov.r .n{color:var(--err)}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-radius:var(--r);overflow:hidden;border:1px solid var(--line)}
.kpi-cell{background:#fff;padding:13px 8px;text-align:center}
.kpi-n{font-size:22px;font-weight:900;font-family:'Syne',sans-serif;line-height:1}
.kpi-l{font-size:10px;color:var(--ink3);margin-top:4px;font-weight:600}

/* Accuracy ring — CSS only */
.ring-wrap{display:flex;align-items:center;gap:14px;padding:14px}
.ring{width:62px;height:62px;border-radius:50%;background:conic-gradient(var(--g400) calc(var(--pct,95.4)*1%),#E0EDE7 0);display:flex;align-items:center;justify-content:center;position:relative}
.ring::before{content:'';position:absolute;width:44px;height:44px;border-radius:50%;background:#fff}
.ring-label{font-size:13px;font-weight:900;font-family:'Syne',sans-serif;position:relative;color:var(--g600)}
.ring-info .pct{font-size:22px;font-weight:900;font-family:'Syne',sans-serif;color:var(--g600)}
.ring-info .tag{font-size:12px;font-weight:700;color:var(--ok)}
.ring-info .sub{font-size:10.5px;color:var(--ink3)}

/* ============================================================
   PILLS & BADGES
   ============================================================ */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pill.ok{background:var(--okbg);color:var(--ok)}
.pill.warn{background:var(--warnbg);color:var(--warn)}
.pill.err{background:var(--errbg);color:var(--err)}
.pill.blue{background:var(--bluebg);color:var(--blue)}
.pill.purple{background:var(--purplebg);color:var(--purple)}
.pill.orange{background:var(--orangebg);color:var(--orange)}
.badge{min-width:18px;height:18px;border-radius:9px;background:var(--err);color:#fff;font-size:10px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;padding:0 4px}

/* ============================================================
   PROGRESS
   ============================================================ */
.prog{height:6px;background:#E2EBE6;border-radius:6px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:6px;background:var(--g400)}
.prog-fill.warn{background:var(--warn)}
.prog-fill.err{background:var(--err)}

/* ============================================================
   LIST ROWS
   ============================================================ */
.list-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
.list-row:last-child{border-bottom:none}
.thumb{width:40px;height:40px;border-radius:10px;background:var(--g050);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:var(--g600)}
.thumb.sm{width:32px;height:32px;border-radius:8px;font-size:14px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--g050);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--g600);flex-shrink:0}

/* Indicator letters */
.ind-tag{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0}

/* ============================================================
   QUICK ACTIONS GRID
   ============================================================ */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.qa-btn{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:12px 6px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;
  cursor:pointer;font-family:inherit;transition:background .15s;
}
.qa-btn:active{background:var(--g025)}
.qa-icon{width:36px;height:36px;border-radius:10px;background:var(--g050);color:var(--g600);display:flex;align-items:center;justify-content:center;font-size:17px}
.qa-label{font-size:9.5px;font-weight:700;color:var(--ink2);text-align:center;line-height:1.25;letter-spacing:.01em}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  border:none;border-radius:12px;padding:14px 18px;
  font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
  letter-spacing:.01em;transition:opacity .15s;
}
.btn:active{opacity:.82}
.btn-full{width:100%}
.btn-primary{background:linear-gradient(150deg,var(--g500),var(--g700));color:#fff;box-shadow:0 4px 12px rgba(30,107,69,.3)}
.btn-ghost{background:#fff;border:1px solid var(--line2);color:var(--ink2)}
.btn-soft{background:var(--g050);color:var(--g600)}
.btn-err{background:var(--errbg);color:var(--err)}
.btn-sm{padding:9px 14px;font-size:12px;border-radius:10px}
.btn-xs{padding:6px 11px;font-size:11px;border-radius:8px}

/* ============================================================
   FORM FIELDS
   ============================================================ */
.field{margin-bottom:13px}
.field label{font-size:11px;font-weight:700;color:var(--ink2);letter-spacing:.03em;text-transform:uppercase;display:block;margin-bottom:5px}
.field input,.field select,.field textarea{
  width:100%;border:1.5px solid var(--line);border-radius:10px;
  padding:12px 13px;font-size:14px;font-family:inherit;background:#fff;
  outline:none;color:var(--ink);transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--g400)}
.field textarea{resize:vertical;min-height:70px}

/* Search box */
.search-box{
  display:flex;align-items:center;gap:9px;background:#fff;
  border:1.5px solid var(--line);border-radius:12px;padding:11px 13px;
  color:var(--ink3);margin-bottom:12px;
}
.search-box input{border:none;outline:none;flex:1;font-family:inherit;font-size:13.5px;background:transparent;color:var(--ink)}
.search-box .ico{font-size:16px}

/* ============================================================
   TABS
   ============================================================ */
.tabs{display:flex;gap:4px;background:#E5EDE8;border-radius:11px;padding:4px;margin-bottom:14px}
.tab-btn{flex:1;border:none;background:transparent;padding:8px 6px;font-size:12px;font-weight:700;color:var(--ink3);border-radius:8px;cursor:pointer;font-family:inherit;letter-spacing:.01em}
.tab-btn.active{background:#fff;color:var(--g600);box-shadow:0 1px 5px rgba(0,0,0,.1)}

/* ============================================================
   SCANNER SCREEN
   ============================================================ */
.scanner-view{
  background:#0a1a0d;height:240px;position:relative;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.scan-corner{position:absolute;width:60px;height:60px;border-color:var(--g400);border-style:solid}
.scan-c1{top:30px;left:30px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.scan-c2{top:30px;right:30px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.scan-c3{bottom:30px;left:30px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.scan-c4{bottom:30px;right:30px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-line{
  position:absolute;width:75%;height:2px;
  background:linear-gradient(90deg,transparent,var(--g400),transparent);
  animation:scanLine 2s ease-in-out infinite;
}
@keyframes scanLine{0%,100%{top:35px}50%{top:calc(100% - 35px)}}
.scan-code{
  position:absolute;bottom:14px;left:0;right:0;text-align:center;
  font-family:ui-monospace,monospace;font-size:12px;color:rgba(255,255,255,.6);letter-spacing:.12em
}
.scan-result{
  margin:14px 16px;padding:12px 14px;border-radius:12px;
  background:var(--okbg);border:1px solid #B8E5CC;
  display:flex;align-items:center;gap:12px;
}
.scan-result .ico-ok{width:36px;height:36px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* ============================================================
   KEYPAD COUNTER
   ============================================================ */
.counter{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:4px}
.stepper{width:52px;height:52px;border-radius:50%;border:1.5px solid var(--line);background:#fff;font-size:24px;color:var(--g600);cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.counter-big{text-align:center;flex:1}
.counter-big .val{font-size:48px;font-family:'Syne',sans-serif;font-weight:900;line-height:1;color:var(--ink)}
.counter-big .unit{font-size:11px;color:var(--ink3);letter-spacing:.1em;font-weight:700}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.keypad button{
  background:#fff;border:1.5px solid var(--line);border-radius:12px;
  padding:16px 0;font-size:20px;font-weight:700;font-family:inherit;color:var(--ink);cursor:pointer;
  transition:background .1s;
}
.keypad button:active{background:var(--g050)}

/* ============================================================
   MAP PLACEHOLDER
   ============================================================ */
.map-area{
  background:linear-gradient(150deg,#1a2e20,#0d1a10);
  height:200px;border-radius:12px;overflow:hidden;position:relative;
  display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(4,1fr);
  gap:1px;padding:12px;
}
.map-grid-cell{
  border-radius:4px;background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;font-size:9px;
  color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.05em;
}
.map-loc{
  width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;color:#fff;position:absolute;transform:translate(-50%,-50%);
}
.map-loc.ok{background:var(--ok)}
.map-loc.warn{background:var(--warn)}
.map-loc.err{background:var(--err)}

/* ============================================================
   INVENTORY INDICATOR LIST
   ============================================================ */
.ind-list{list-style:none}
.ind-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line)}
.ind-item:last-child{border-bottom:none}
.ind-item .val{font-size:15px;font-weight:900;font-family:'Syne',sans-serif;color:var(--ink);min-width:32px;text-align:right}
.ind-item .val.warn{color:var(--warn)}
.ind-item .val.err{color:var(--err)}
.ind-item .val.ok{color:var(--ok)}

/* ============================================================
   CONNECTION / SYNC SCREEN
   ============================================================ */
.sync-status{
  padding:16px;display:flex;align-items:center;gap:14px;
  background:var(--okbg);border:1px solid #C0E5CF;border-radius:12px;margin-bottom:14px;
}
.sync-dot{width:10px;height:10px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-err{background:var(--errbg);border-color:#F0C5C5}
.sync-err .sync-dot{background:var(--err);animation:none}

/* Diag result rows */
.diag-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line);font-size:13px}
.diag-row:last-child{border-bottom:none}
.diag-row .lbl{font-weight:600;color:var(--ink2)}
.diag-row .val{font-weight:700}
.diag-row .val.ok{color:var(--ok)}
.diag-row .val.err{color:var(--err)}
.diag-row .val.warn{color:var(--warn)}

/* ============================================================
   REPORT / SIGNATURE
   ============================================================ */
.sig-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.sig-box{border:1px dashed var(--line2);border-radius:10px;padding:12px;text-align:center}
.sig-line{height:36px;border-bottom:1.5px solid var(--ink3);margin-bottom:6px}
.sig-label{font-size:10px;color:var(--ink3);font-weight:600}

/* ============================================================
   TIMELINE / HISTORY
   ============================================================ */
.timeline{padding:0 16px}
.tl-item{display:flex;gap:12px;padding-bottom:14px;position:relative}
.tl-item::before{content:'';position:absolute;left:11px;top:24px;bottom:0;width:1px;background:var(--line)}
.tl-item:last-child::before{display:none}
.tl-dot{width:24px;height:24px;border-radius:50%;background:var(--g050);border:2px solid var(--g300);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;position:relative;z-index:1}
.tl-dot.ok{background:var(--okbg);border-color:var(--ok)}
.tl-dot.warn{background:var(--warnbg);border-color:var(--warn)}
.tl-content{flex:1;padding-top:3px}
.tl-title{font-size:13px;font-weight:700;color:var(--ink)}
.tl-sub{font-size:11px;color:var(--ink3);margin-top:2px}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
.login-wrap{
  background:linear-gradient(160deg,var(--g900),var(--g700));
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px 24px;color:#fff;
}
.login-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:900;letter-spacing:-.02em;margin-bottom:4px}
.login-logo span{color:var(--g400)}
.login-sub{font-size:13px;opacity:.7;margin-bottom:36px;letter-spacing:.02em}
.login-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:24px;width:100%;max-width:380px;backdrop-filter:blur(10px)}
.login-field label{font-size:11px;font-weight:700;letter-spacing:.05em;opacity:.7;display:block;margin-bottom:6px;text-transform:uppercase}
.login-field input{
  width:100%;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.15);
  border-radius:10px;padding:13px 14px;font-size:14px;color:#fff;font-family:inherit;outline:none;
  margin-bottom:12px;transition:border-color .15s;
}
.login-field input:focus{border-color:var(--g400)}
.login-field input::placeholder{color:rgba(255,255,255,.35)}
.btn-login{
  width:100%;background:linear-gradient(150deg,var(--g400),var(--g600));color:#fff;
  border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:800;
  font-family:inherit;cursor:pointer;letter-spacing:.02em;margin-top:4px;
}
.login-token{margin-top:20px}
.login-token input{letter-spacing:.2em;font-size:18px;font-weight:700;text-align:center}
.login-ver{font-size:10px;opacity:.4;margin-top:24px;text-align:center;letter-spacing:.05em}

/* ============================================================
   AI CARD
   ============================================================ */
.ai-card{
  background:linear-gradient(135deg,#0d1e30,#162e1e);
  border:1px solid rgba(255,255,255,.1);border-radius:14px;
  padding:16px;color:#fff;position:relative;overflow:hidden;
}
.ai-card::before{
  content:'AI';position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-family:'Syne',sans-serif;font-size:60px;font-weight:900;color:rgba(255,255,255,.04);

/* ============================================================
   API -- Fetch com retry JSONP
   Diagnóstico: ping funciona (fetch OK), mas outras ações
   dão "Failed to fetch" = CORS bloqueado só nelas.
   Solução: tenta fetch, se CORS falhar tenta JSONP, se JSONP
   falhar tenta fetch com mode:no-cors + parse JSONP do body.
   ============================================================ */
function apiJsonp(action, params, cb) {
  var url = State.apiUrl || getUrl();
  if (!url) { cb && cb(null); return; }

  var qs = Object.keys(params || {}).map(function(k) {
    return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  }).join('&');
  var baseUrl = url + '?action=' + action + (qs ? '&' + qs : '');

  var done = false;
  var timer = setTimeout(function() {
    if (!done) { done = true; cb && cb(null); }
  }, 12000);

  function finish(data) {
    if (!done) { done = true; clearTimeout(timer); cb && cb(data); }
  }

  function tryJsonp() {
    var cbName = '__alm_' + Date.now() + '_' + Math.floor(Math.random()*9999);
    var jpDone = false;
    var jpTimer = setTimeout(function() {
      if (!jpDone) { jpDone = true; delete window[cbName]; finish(null); }
    }, 8000);
    window[cbName] = function(r) {
      clearTimeout(jpTimer);
      if (!jpDone) { jpDone = true; delete window[cbName]; finish(r); }
    };
    var s = document.createElement('script');
    s.src = baseUrl + '&callback=' + cbName + '&_=' + Date.now();
    s.onerror = function() {
      clearTimeout(jpTimer);
      if (!jpDone) { jpDone = true; delete window[cbName]; finish(null); }
      s.remove && s.remove();
    };
    document.head.appendChild(s);
  }

  function parseResponse(txt) {
    if (!txt) return null;
    txt = txt.trim();
    try { return JSON.parse(txt); } catch(e) {}
    // JSONP wrapper
    var m = txt.match(/^[a-zA-Z0-9_$.]+\s*\(([\s\S]*)\)\s*;?\s*$/);
    if (m) { try { return JSON.parse(m[1]); } catch(e) {} }
    return null;
  }

  // TENTATIVA 1: fetch normal
  fetch(baseUrl + '&_=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      var d = parseResponse(txt);
      if (d) { finish(d); return; }
      // Texto veio mas não parseou -- tenta JSONP
      tryJsonp();
    })
    .catch(function() {
      // TENTATIVA 2: JSONP (contorna CORS via <script>)
      tryJsonp();
    });
}

function getUrl() { return State.apiUrl || localStorage.getItem('almv25_url') || ''; }
function setUrl(u) { State.apiUrl = u; if (u) localStorage.setItem('almv25_url', u); }
function loadSavedUrl() {
  var DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbx4ezeMZbS-qlIiyWi665_luw21uNx92TURglQiSwHOzbrg3DL3Kc7fbBsQ-ckNB_byLQ/exec';
  var u = localStorage.getItem('almv25_url');
  State.apiUrl = u || DEFAULT_URL;
  if (!u) localStorage.setItem('almv25_url', DEFAULT_URL);
}

/* ============================================================
   SCREEN ROUTER
   ============================================================ */
var _currentScreen = 'dashboard';
var _screenStack = [];

function buildScreens() {
  var container = document.getElementById('screens');
  var html = '';
  Object.keys(SCREENS).forEach(function (id) {
    html += SCREENS[id];
  });
  container.innerHTML = html;
}

function go(screenId, pushHistory) {
  if (pushHistory !== false && _currentScreen !== screenId) {
    _screenStack.push(_currentScreen);
  }
  _currentScreen = screenId;

  document.querySelectorAll('.screen').forEach(function (s) {
    s.classList.remove('active');
  });
  var target = document.querySelector('[data-screen="' + screenId + '"]');
  if (target) {
    target.classList.add('active');
    target.scrollTop = 0;
  }

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(function (b) {
    b.classList.toggle('active', b.dataset.go === screenId);
  });

  // Screen hooks
  if (screenId === 'inventarios') loadInventarios();
  if (screenId === 'reservas') loadReservas();
  onScreenActivated(screenId);
}

function goBack() {
  if (_screenStack.length) go(_screenStack.pop(), false);
  else go('dashboard', false);
}

/* ============================================================
   CLOCK
   ============================================================ */
function updateClock() {
  var now = new Date();
  var h = now.getHours(), m = now.getMinutes();
  document.getElementById('clock').textContent =
    (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}

/* --- Simular scan --- */
// ── Câmera real ──────────────────────────────────────────────
var _scanStream = null;
var _scanFrame  = null;

function iniciarCamera() {
  if (_scanStream) { pararCamera(); return; }
  var video = document.getElementById('scanVideo');
  if (!video) {
    // Cria elemento video na tela do scanner
    var sv = document.querySelector('.scanner-view');
    if (sv) {
      video = document.createElement('video');
      video.id = 'scanVideo';
      video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:12px;z-index:0';
      video.setAttribute('playsinline', '');
      video.setAttribute('autoplay', '');
      video.setAttribute('muted', '');
      sv.insertBefore(video, sv.firstChild);
    }
  }
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(function(stream) {
      _scanStream = stream;
      if (video) { video.srcObject = stream; video.play(); }
      var btn = document.getElementById('btnCamera');
      if (btn) btn.textContent = '⏹ Parar Câmera';
      _loopScan();
    })
    .catch(function(err) {
      alert('Camera indisponivel: ' + err.message + '\n\nUse o campo de codigo manual abaixo.');
    });
}

function pararCamera() {
  if (_scanFrame) { cancelAnimationFrame(_scanFrame); _scanFrame = null; }
  if (_scanStream) { _scanStream.getTracks().forEach(function(t){ t.stop(); }); _scanStream = null; }
  var btn = document.getElementById('btnCamera');
  if (btn) btn.textContent = '📷 Câmera';
}

function _loopScan() {
  var video = document.getElementById('scanVideo');
  if (!video || !_scanStream) return;

  if (window.BarcodeDetector) {
    // Usa canvas para capturar frame
    var canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    var bd = new BarcodeDetector({ formats: ['ean_13','ean_8','code_128','code_39','qr_code','upc_a','itf'] });
    bd.detect(canvas).then(function(barcodes) {
      if (barcodes.length > 0) {
        var cod = barcodes[0].rawValue;
        pararCamera();
        processarCodigoLido(cod);
        return;
      }
      _scanFrame = requestAnimationFrame(_loopScan);
    }).catch(function() {
      _scanFrame = requestAnimationFrame(_loopScan);
    });
  } else if (window.ZXing && window.ZXing.BrowserMultiFormatReader) {
    var reader2 = new ZXing.BrowserMultiFormatReader();
    reader2.decodeFromVideoElement(video).then(function(result) {
      if (result) {
        pararCamera();
        processarCodigoLido(result.getText());
      }
    }).catch(function() {
      _scanFrame = requestAnimationFrame(_loopScan);
    });
  } else {
    var sc = document.getElementById('scanCode');
    if (sc) sc.textContent = 'Use o campo abaixo';
    pararCamera();
  }
}

function processarCodigoLido(cod) {
  // Mostra o código lido
  var sc = document.getElementById('scanCode');
  if (sc) sc.textContent = cod;

  // Verifica se tem inventário carregado
  if (!_itensInv || !_itensInv.length) {
    document.getElementById('scanItemNm').textContent  = 'Nenhum inventário carregado!';
    document.getElementById('scanItemCod').textContent = 'Código lido: ' + cod;
    document.getElementById('scanItemInfo').textContent = 'Vá em Inventários e abra um inventário primeiro.';
    document.getElementById('scanResult').style.display = 'flex';
    return;
  }

  // Procura o item no inventário carregado
  var item = null;
  var idx  = -1;
  if (_itensInv && _itensInv.length) {
    for (var i = 0; i < _itensInv.length; i++) {
      var it = _itensInv[i];
      if (String(it.cod || '').toUpperCase() === cod.toUpperCase() ||
          String(it.nm  || '').toUpperCase().indexOf(cod.toUpperCase()) >= 0) {
        item = it; idx = i; break;
      }
    }
  }

  if (item) {
    // Encontrou — mostra resultado e abre modal de contagem
    document.getElementById('scanItemNm').textContent  = item.nm || item.cod;
    document.getElementById('scanItemCod').textContent = 'Cód: ' + item.cod;
    document.getElementById('scanItemInfo').textContent = 'SAP: ' + item.t + ' · Local: ' + (item.local || '—');
    document.getElementById('scanResult').style.display = 'flex';
    // Abre modal de contagem após 500ms
    setTimeout(function() { abrirContagemItem(idx); }, 500);
  } else {
    // Não encontrou no inventário
    document.getElementById('scanItemNm').textContent  = 'Código: ' + cod;
    document.getElementById('scanItemCod').textContent = 'Item não encontrado no inventário';
    document.getElementById('scanItemInfo').textContent = 'Verifique o token carregado';
    document.getElementById('scanResult').style.display = 'flex';
  }
}

// Leitura manual pelo campo de texto
function lerCodigoManual() {
  var inp = document.getElementById('scanManualInput');
  var cod = inp ? inp.value.trim() : '';
  if (!cod) { alert('Digite o código do item'); return; }
  processarCodigoLido(cod);

function simularScan() {
  if (!_itensInv || !_itensInv.length) {
    alert('Carregue um inventario primeiro.\nVa em Inventarios e toque em um inventario.');
    return;
  }
  var idx = Math.floor(Math.random() * _itensInv.length);

  processarCodigoLido(it.cod || 'SEM-COD');
}

var _caLogs = [];

/* PASSO 1 -- Testar URL (fetch ping) */
function caTestarUrl() {
  var url = caGetUrl();
  if (!url) { caStatus('caS1','🔴','Sem URL','var(--err)'); caLog('ERRO: URL não configurada'); return; }
  caStatus('caS1','⏳','Testando...','var(--ink3)');
  caLog('Testando URL: ' + url.substring(0,60) + '...');
  var t0 = Date.now();
  fetch(url + '?action=ping&_=' + Date.now())
    .then(function(r) {
      caLog('HTTP ' + r.status + ' ' + r.statusText);
      return r.text();
    })
    .then(function(txt) {
      var ms = Date.now() - t0;
      caLog('Resposta em ' + ms + 'ms: ' + txt.substring(0, 120));
      try {
        var d = JSON.parse(txt);
        if (d.ok || d.status === 'online') {
          caStatus('caS1','🟢','Online · ' + ms + 'ms','var(--ok)');
          caResp('✓ Ping OK (' + ms + 'ms)', d, 'var(--ok)');
          caLog('OK: ok=' + d.ok + ' versaoApi=' + (d.versaoApi||'--'));
        } else {
          caStatus('caS1','🟡','Resposta sem ok=true','var(--warn)');
          caResp('⚠ Resposta recebida mas ok≠true', d, 'var(--warn)');
          caLog('AVISO: API respondeu mas ok=false');
        }
      } catch(e) {
        caStatus('caS1','🟡','Resposta não-JSON · ' + ms + 'ms','var(--warn)');
        caResp('⚠ Resposta não é JSON puro', txt.substring(0,300), 'var(--warn)');
        caLog('Parse JSON falhou: ' + e.message);
      }
    })
    .catch(function(e) {
      caStatus('caS1','🔴','Erro: ' + e.message.substring(0,30),'var(--err)');
      caResp('❌ Erro de conexão', e.message, 'var(--err)');
      caLog('ERRO fetch: ' + e.message);
    });
}

/* PASSO 2 -- Testar Token */
function caTestarToken() {
  var url = caGetUrl();
  var tok = (document.getElementById('caTokenInput') || {}).value || State.token || localStorage.getItem('almv25_token') || '';
  if (!url) { caStatus('caS2','🔴','Sem URL','var(--err)'); return; }
  if (!tok) { caStatus('caS2','🔴','Digite o token','var(--err)'); caLog('ERRO: token não informado'); return; }
  caStatus('caS2','⏳','Testando token ' + tok + '...','var(--ink3)');
  caLog('Testando token: ' + tok);
  fetch(url + '?action=buscarToken&token=' + encodeURIComponent(tok) + '&_=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      caLog('buscarToken resposta: ' + txt.substring(0, 150));
      try {
        var d = JSON.parse(txt);
        if (d.ok) {
          caStatus('caS2','🟢','Token válido · ' + (d.inventario||''),'var(--ok)');
          caResp('✓ Token ' + tok + ' encontrado', d, 'var(--ok)');
          State.token = tok;
          localStorage.setItem('almv25_token', tok);
          // Reseta nível de conferência ao carregar novo token
          localStorage.removeItem('conf_nivel_' + tok);
          _confAtual = 1;
          caLog('Token OK: inventario=' + (d.inventario||'--') + ' obra=' + (d.obra||'--'));
        } else {
          caStatus('caS2','🔴','Token não encontrado','var(--err)');
          caResp('❌ Token inválido', d, 'var(--err)');
          caLog('Token FALHOU: ' + JSON.stringify(d));
        }
      } catch(e) {
        caStatus('caS2','🟡','Resposta não-JSON','var(--warn)');
        caResp('⚠ Resposta não-JSON', txt.substring(0,300), 'var(--warn)');
        caLog('Parse falhou: ' + e.message);
      }
    })
    .catch(function(e) {
      caStatus('caS2','🔴','Erro: ' + e.message.substring(0,30),'var(--err)');
      caResp('❌ Erro', e.message, 'var(--err)');
      caLog('ERRO: ' + e.message);
    });
}

/* PASSO 3 -- Buscar Inventário */
function caBuscarInventario() {
  var url = caGetUrl();
  var tok = (document.getElementById('caTokenInput') || {}).value || State.token || '';
  if (!url) { caStatus('caS3','🔴','Sem URL','var(--err)'); return; }
  if (!tok) { caStatus('caS3','🔴','Informe o token','var(--err)'); return; }
  caStatus('caS3','⏳','Buscando...','var(--ink3)');
  caLog('Buscando inventário token=' + tok);
  fetch(url + '?action=carregarInventario&token=' + encodeURIComponent(tok) + '&_=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      caLog('carregarInventario: ' + txt.substring(0,150));
      try {
        var d = JSON.parse(txt);
        if (d.ok) {
          var qtd = (d.itens||[]).length;
          caStatus('caS3','🟢', qtd + ' itens carregados','var(--ok)');
          caResp('✓ Inventário carregado · ' + qtd + ' itens', d, 'var(--ok)');
          caLog('Inventário OK: ' + qtd + ' itens, obra=' + (d.obra||'--'));
        } else {
          caStatus('caS3','🔴','Falhou','var(--err)');
          caResp('❌ Inventário não carregado', d, 'var(--err)');
          caLog('FALHOU: ' + JSON.stringify(d));
        }
      } catch(e) {
        caStatus('caS3','🟡','Resposta não-JSON','var(--warn)');
        caResp('⚠ Resposta não-JSON', txt.substring(0,400), 'var(--warn)');
        caLog('Parse falhou: ' + e.message);
      }
    })
    .catch(function(e) {
      caStatus('caS3','🔴','Erro','var(--err)');
      caResp('❌ Erro', e.message, 'var(--err)');
      caLog('ERRO: ' + e.message);
    });
}

/* PASSO 4 -- Buscar Localizações */
function caBuscarLocalizacoes() {
  var url = caGetUrl();
  if (!url) { caStatus('caS4','🔴','Sem URL','var(--err)'); return; }
  caStatus('caS4','⏳','Buscando...','var(--ink3)');
  caLog('Buscando localizações...');
  fetch(url + '?action=buscarLocalizacao&_=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      caLog('buscarLocalizacao: ' + txt.substring(0,150));
      try {
        var d = JSON.parse(txt);
        if (d.ok) {
          var qtd = (d.locais||d.localizacoes||[]).length;
          caStatus('caS4','🟢', qtd + ' locais','var(--ok)');
          caResp('✓ Localizações · ' + qtd + ' locais', d, 'var(--ok)');
          caLog('Localizações OK: ' + qtd);
        } else {
          caStatus('caS4','🔴','Falhou','var(--err)');
          caResp('❌ Localizações não carregadas', d, 'var(--err)');
          caLog('FALHOU: ' + JSON.stringify(d));
        }
      } catch(e) {
        caStatus('caS4','🟡','Resposta não-JSON','var(--warn)');
        caResp('⚠ Resposta bruta (pode ser correto):', txt.substring(0,400), 'var(--warn)');
        caLog('Parse falhou -- resposta: ' + txt.substring(0,100));
      }
    })
    .catch(function(e) {
      caStatus('caS4','🔴','Erro','var(--err)');
      caResp('❌ Erro', e.message, 'var(--err)');
      caLog('ERRO: ' + e.message);
    });
}

/* PASSO 5 -- Verificar Permissões (checa se retorna corretamente sem auth) */
function caVerificarPermissoes() {
  var url = caGetUrl();
  if (!url) { caStatus('caS5','🔴','Sem URL','var(--err)'); return; }
  caStatus('caS5','⏳','Verificando...','var(--ink3)');
  caLog('Verificando permissões de acesso...');
  // Testa sem parâmetros -- se retornar algo = acesso público OK
  fetch(url + '?action=ping&_=' + Date.now(), {
    method: 'GET',
    headers: { 'Accept': 'application/json' }
  })
    .then(function(r) {
      caLog('HTTP ' + r.status + ' headers ok=' + r.ok);
      if (r.status === 200) {
        caStatus('caS5','🟢','Acesso público OK','var(--ok)');
        caResp('✓ Permissão OK -- script acessível publicamente', 'HTTP ' + r.status, 'var(--ok)');
        caLog('Permissão OK: HTTP 200');
      } else if (r.status === 302 || r.status === 401) {
        caStatus('caS5','🔴','Não autorizado (302/401)','var(--err)');
        caResp('❌ Acesso negado -- reimplante como "Qualquer pessoa"', 'HTTP ' + r.status, 'var(--err)');
        caLog('PERMISSÃO NEGADA: HTTP ' + r.status + ' → reimplante no Apps Script como "Qualquer pessoa"');
      } else {
        caStatus('caS5','🟡','HTTP ' + r.status,'var(--warn)');
        caResp('⚠ HTTP ' + r.status + ' -- verifique o script', 'HTTP ' + r.status, 'var(--warn)');
        caLog('Status inesperado: HTTP ' + r.status);
      }
    })
    .catch(function(e) {
      caStatus('caS5','🔴','Erro CORS','var(--err)');
      caResp('❌ Erro CORS -- o script não permite requisições externas', e.message, 'var(--err)');
      caLog('CORS ERROR: ' + e.message);
    });
}

/* CARREGAR TUDO -- executa passos 1→2→3 em sequência */
function caCarregarTudo() {
  var url = caGetUrl();
  var tok = ((document.getElementById('caTokenInput') || {}).value || '').trim();
  if (!url) { alert('Cole a URL da API e salve.'); return; }
  if (!tok) { alert('Digite o token do inventário.'); return; }
  setUrl(url); State.apiUrl = url;
  State.token = tok; localStorage.setItem('almv25_token', tok);

  caLog('=== CARREGAR COMPLETO ===');
  caLog('URL: ' + url.substring(0,60) + '...');
  caLog('Token: ' + tok);

  // Passo 1: ping
  caStatus('caS1','⏳','...','var(--ink3)');
  caStatus('caS2','⏳','...','var(--ink3)');
  caStatus('caS3','⏳','...','var(--ink3)');

  fetch(url + '?action=ping&_=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      caLog('Ping: ' + txt.substring(0,80));
      try {
        var d = JSON.parse(txt);
        if (d.ok || d.status === 'online') {
          caStatus('caS1','🟢','OK','var(--ok)');
          caLog('Ping OK versaoApi=' + (d.versaoApi||'--'));
        } else { caStatus('caS1','🟡','Resposta estranha','var(--warn)'); }
      } catch(e) { caStatus('caS1','🟡','Não-JSON','var(--warn)'); }

      // Passo 2: token
      return fetch(url + '?action=buscarToken&token=' + encodeURIComponent(tok) + '&_=' + Date.now());
    })
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      caLog('Token: ' + txt.substring(0,80));
      try {
        var d = JSON.parse(txt);
        if (d.ok) {
          caStatus('caS2','🟢','Válido','var(--ok)');
          caLog('Token OK: obra=' + (d.obra||'--'));
          if (d.obra) State.obra = d.obra;
        } else { caStatus('caS2','🔴','Inválido','var(--err)'); caLog('Token inválido: ' + JSON.stringify(d)); return Promise.reject('token_invalido'); }
      } catch(e) { caStatus('caS2','🟡','Não-JSON','var(--warn)'); }

      // Passo 3: inventário
      return fetch(url + '?action=carregarInventario&token=' + encodeURIComponent(tok) + '&_=' + Date.now());
    })
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      caLog('Inventário: ' + txt.substring(0,100));
      try {
        var d = JSON.parse(txt);
        if (d.ok) {
          var qtd = (d.itens||[]).length;
          caStatus('caS3','🟢', qtd + ' itens','var(--ok)');
          caResp('✅ Tudo carregado! ' + qtd + ' itens prontos.', d, 'var(--ok)');
          caLog('SUCESSO: inventário com ' + qtd + ' itens');
          alert('✅ Inventário carregado! ' + qtd + ' itens prontos para uso.');
        } else {
          caStatus('caS3','🔴','Falhou','var(--err)');
          caResp('❌ Inventário vazio ou erro', d, 'var(--err)');
          caLog('Inventário falhou: ' + JSON.stringify(d));
        }
      } catch(e) {
        caStatus('caS3','🟡','Não-JSON','var(--warn)');
        caResp('⚠ Resposta bruta do inventário', txt.substring(0,400), 'var(--warn)');
        caLog('Parse falhou: ' + e.message + ' | Raw: ' + txt.substring(0,60));
      }
    })
    .catch(function(e) {
      if (e === 'token_invalido') return;
      caLog('ERRO geral: ' + e.message || e);
      caResp('❌ Erro na sequência', String(e), 'var(--err)');
    });
}

function cfBuscarDadosAPI() {
  var url = getUrl();
  var box = document.getElementById('cfAPIResp');
  var body = document.getElementById('cfAPIRespBody');
  var invList = document.getElementById('cfInventList');
  if (!url) { alert('Configure a URL da API primeiro em Mais -> Conexao API.'); return; }
  if (box) box.style.display = 'block';
  if (body) body.innerHTML = '⏳ Buscando dados da API...';
  if (invList) invList.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:var(--ink3)">Carregando...</div>';

  // Busca lista de inventários / tokens disponíveis
  fetch(url + '?action=listarInventarios&_=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(txt) {
      try {
        var d = JSON.parse(txt);
        if (d.ok && (d.inventarios || d.tokens || d.itens)) {
          var lista = d.inventarios || d.tokens || d.itens || [];
          if (body) body.innerHTML = '<span style="color:var(--ok);font-weight:700">Conectado! ' + lista.length + ' inventários encontrados.</span>';
          if (invList) {
            if (!lista.length) {
              invList.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:var(--ink3)">Nenhum inventário encontrado na API.</div>';
            } else {
              invList.innerHTML = lista.map(function(inv, idx) {
                var tok = inv.token || inv.id || inv.codigo || inv;
                var nm  = inv.nome || inv.descricao || inv.inventario || tok;
                var ob  = inv.obra || inv.local || '';
                return '<div class="list-row" style="cursor:pointer" onclick="cfSelecionarInventario(' + JSON.stringify(tok) + ',' + JSON.stringify(nm) + ',' + JSON.stringify(ob) + ')">'
                  + '<div class="thumb sm" style="background:var(--g050);color:var(--g600)">📋</div>'
                  + '<div style="flex:1"><div style="font-size:13px;font-weight:700">' + nm + '</div>'
                  + (ob ? '<div class="note">' + ob + '</div>' : '')
                  + '<div class="code">' + tok + '</div></div>'
                  + '<span class="btn btn-soft btn-xs">Usar</span></div>';
              }).join('');
            }
          }
        } else {
          // API respondeu mas sem inventarios -- mostrar resposta bruta
          if (body) body.innerHTML = '<span style="color:var(--warn);font-weight:700">Conectado, mas a acao listarInventarios retornou:</span><br><pre style="font-size:10px;word-break:break-all;white-space:pre-wrap;margin-top:6px">' + txt.substring(0,300) + '</pre>';
          if (invList) invList.innerHTML = '<div style="padding:12px 14px"><div class="note">A API nao tem a acao listarInventarios. Cole o token manualmente acima.</div></div>';
        }
      } catch(e) {
        if (body) body.innerHTML = '<span style="color:var(--warn)">Resposta nao-JSON:</span><br><pre style="font-size:10px;word-break:break-all;white-space:pre-wrap;margin-top:6px">' + txt.substring(0,400) + '</pre>';
        if (invList) invList.innerHTML = '<div style="padding:12px 14px"><div class="note">Cole o token manualmente acima.</div></div>';
      }
    })
    .catch(function(e) {
      if (body) body.innerHTML = '<span style="color:var(--err);font-weight:700">Erro: ' + e.message + '</span>';
    });
}

/* ============================================================
   RELATÓRIO DINÂMICO + PDF
   ============================================================ */

function gerarRelatorio() {
  var itens  = _itensInv;
  var titulo = localStorage.getItem('almv25_titulo') || State.token || '--';
  var obra   = State.obra  || localStorage.getItem('almv25_obra')  || '--';
  var nome   = localStorage.getItem('almv25_nome') || 'Almoxarife';
  var token  = State.token || localStorage.getItem('almv25_token') || '--';
  var agora  = new Date().toLocaleString('pt-BR');

  if (!itens || !itens.length) {
    var box = document.getElementById('relConteudo');
    if (box) box.innerHTML = '<div class="empty"><div class="ico">📄</div><p>Nenhum item carregado.<br>Abra o inventário primeiro.</p></div>';
    return;
  }

  // -- Calcula indicadores ---------------------------------------
  var total    = itens.length;
  var contados = itens.filter(function(i){ return i.c > 0; }).length;
  var semDiv   = itens.filter(function(i){ return (i.c - i.t) === 0 && i.c > 0; }).length;
  var sobrando = itens.filter(function(i){ return (i.c - i.t) > 0; }).length;
  var faltando = itens.filter(function(i){ return (i.c - i.t) < 0 && i.c > 0; }).length;
  var naoLanc  = itens.filter(function(i){ return i.c === 0; }).length;

  var pct      = total > 0 ? Math.round(contados / total * 100) : 0;
  var pctOk    = total > 0 ? Math.round(semDiv   / total * 100) : 0;
  var pctCor   = pct >= 90 ? 'var(--ok)' : pct >= 70 ? 'var(--warn)' : 'var(--err)';
  var pctTag   = pct >= 90 ? 'Excelente' : pct >= 70 ? 'Regular' : 'Atenção';

  // -- Valores financeiros ---------------------------------------
  var vlrTotal = 0, vlrDiv = 0, vlrSob = 0, vlrFalt = 0;
  itens.forEach(function(i) {
    var vu  = i.vu  || 0;
    var dif = i.c - i.t;
    vlrTotal += i.t * vu;
    if (dif !== 0) vlrDiv += Math.abs(dif) * vu;
    if (dif > 0)   vlrSob  += dif * vu;
    if (dif < 0)   vlrFalt += Math.abs(dif) * vu;
  });

  function brl(v) {
    var s = Math.abs(v).toFixed(2);
    var parts = s.split('.');
    var intStr = parts[0];
    var dec = parts[1];
    var result = '';
    for (var i = 0; i < intStr.length; i++) {
      if (i > 0 && (intStr.length - i) % 3 === 0) result += '.';
      result += intStr[i];
    }
    return (v < 0 ? '-' : '') + 'R$ ' + result + ',' + dec;
  }

  // -- Monta HTML do relatório -----------------------------------
  var html = '';

  // Cabeçalho
  html += '<div class="card mb12 card-body" style="background:linear-gradient(150deg,var(--g700),var(--g600));color:#fff">'
    + '<div style="font-size:11px;opacity:.7;font-weight:700;letter-spacing:.08em;text-transform:uppercase">Relatório do Inventário</div>'
    + '<div style="font-size:18px;font-weight:900;font-family:Syne,sans-serif;margin:4px 0">' + titulo + '</div>'
    + '<div style="font-size:12px;opacity:.8">Obra: ' + obra + '</div>'
    + '<div style="font-size:11px;opacity:.7;margin-top:4px">Token: ' + token + ' &nbsp;·&nbsp; ' + agora + '</div>'
    + '</div>';

  // Acurácia
  html += '<div class="sec-title" style="margin-left:0">Acurácia do Inventário</div>'
    + '<div class="card mb12"><div class="ring-wrap">'
    + '<div class="ring" style="--pct:' + pct + '"><span class="ring-label" style="color:' + pctCor + '">' + pct + '%</span></div>'
    + '<div class="ring-info" style="flex:1">'
    + '<div style="font-size:24px;font-weight:900;font-family:Syne,sans-serif;color:' + pctCor + '">' + pct + '%</div>'
    + '<div style="font-size:12px;font-weight:700;color:' + pctCor + '">' + pctTag + '</div>'
    + '<div style="font-size:11px;color:var(--ink3)">Meta: ≥ 90% · ' + contados + '/' + total + ' itens contados</div>'
    + '</div>'
    + '<div style="text-align:right">'
    + '<div style="font-size:20px;font-weight:900;font-family:Syne,sans-serif;color:var(--ok)">' + pctOk + '%</div>'
    + '<div style="font-size:10px;color:var(--ink3)">Sem divergência</div>'
    + '</div>'
    + '</div></div>';

  // Resumo itens
  html += '<div class="sec-title" style="margin-left:0">Resumo dos Itens</div>'
    + '<div class="card mb12">'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)">'
    + '<div style="background:#fff;padding:11px 14px"><div class="note">Total no inventário</div><div style="font-size:18px;font-weight:900;font-family:Syne,sans-serif">' + total + '</div></div>'
    + '<div style="background:#fff;padding:11px 14px"><div class="note">Contados</div><div style="font-size:18px;font-weight:900;font-family:Syne,sans-serif;color:var(--ok)">' + contados + '</div></div>'
    + '<div style="background:#fff;padding:11px 14px"><div class="note">Sobrando (excesso)</div><div style="font-size:18px;font-weight:900;font-family:Syne,sans-serif;color:var(--warn)">' + sobrando + '</div></div>'
    + '<div style="background:#fff;padding:11px 14px"><div class="note">Faltando</div><div style="font-size:18px;font-weight:900;font-family:Syne,sans-serif;color:var(--err)">' + faltando + '</div></div>'
    + '<div style="background:#fff;padding:11px 14px"><div class="note">Sem divergência</div><div style="font-size:18px;font-weight:900;font-family:Syne,sans-serif;color:var(--ok)">' + semDiv + '</div></div>'
    + '<div style="background:#fff;padding:11px 14px"><div class="note">Não lançados</div><div style="font-size:18px;font-weight:900;font-family:Syne,sans-serif;color:var(--ink3)">' + naoLanc + '</div></div>'
    + '</div></div>';

  // Valores financeiros
  html += '<div class="sec-title" style="margin-left:0">Valores Financeiros</div>'
    + '<div class="card mb12 card-body">'
    + '<div class="flexb mb8"><span class="note">Valor total do inventário (SAP)</span><span style="font-weight:700">' + brl(vlrTotal) + '</span></div>'
    + '<div class="flexb mb8"><span class="note">Valor em divergência total</span><span style="font-weight:700;color:var(--err)">' + brl(vlrDiv) + '</span></div>'
    + '<div class="flexb mb8"><span class="note">Valor sobrando</span><span style="font-weight:700;color:var(--warn)">' + brl(vlrSob) + '</span></div>'
    + '<div class="flexb"><span class="note">Valor faltando</span><span style="font-weight:700;color:var(--err)">' + brl(vlrFalt) + '</span></div>'
    + '</div>';

  // Lista de divergências
  var divs = itens.filter(function(i){ return (i.c - i.t) !== 0 || i.c === 0; });
  if (divs.length) {
    html += '<div class="sec-title" style="margin-left:0">Itens com Divergência (' + divs.length + ')</div>'
      + '<div class="card mb12">'
      + divs.map(function(i) {
          var dif = i.c - i.t;
          var cor = dif === 0 && i.c === 0 ? 'var(--ink3)' : dif > 0 ? 'var(--warn)' : 'var(--err)';
          var txt = i.c === 0 ? 'Não lançado' : (dif > 0 ? '+'+dif : String(dif));
          return '<div class="list-row">'
            + '<div style="flex:1">'
            + '<div style="font-size:12px;font-weight:700">' + (i.nm || i.cod) + '</div>'
            + '<div class="code">' + i.cod + '</div>'
            + '<div style="font-size:11px;margin-top:2px">SAP: <b>' + i.t + '</b> · Contado: <b>' + i.c + '</b> · Valor: <b>' + brl(Math.abs(dif)*(i.vu||0)) + '</b></div>'
            + '</div>'
            + '<div style="font-size:16px;font-weight:900;color:' + cor + '">' + txt + '</div>'
            + '</div>';
        }).join('')
      + '</div>';
  }

  // Assinaturas
  html += '<div class="sec-title" style="margin-left:0">Assinaturas</div>'
    + '<div class="sig-row mb12">'
    + '<div class="sig-box"><div class="sig-line"></div><div class="sig-label">' + nome + '<br>' + agora + '</div></div>'
    + '<div class="sig-box"><div class="sig-line"></div><div class="sig-label">Gerente / Responsável<br>&nbsp;</div></div>'
    + '</div>';

  // Botões
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">'
    + '<button class="btn btn-primary" onclick="baixarPDF()">📄 Baixar PDF</button>'
    + '<button class="btn btn-ghost" onclick="compartilharRelatorio()">✉️ Compartilhar</button>'
    + '</div>';

  var box = document.getElementById('relConteudo');
  if (box) box.innerHTML = html;
}

/* --- PDF via janela de impressão --- */
function baixarPDF() {
  var itens  = _itensInv;
  var titulo = localStorage.getItem('almv25_titulo') || State.token || '--';
  var obra   = State.obra  || localStorage.getItem('almv25_obra')  || '--';
  var nome   = localStorage.getItem('almv25_nome') || 'Almoxarife';
  var token  = State.token || localStorage.getItem('almv25_token') || '--';
  var agora  = new Date().toLocaleString('pt-BR');

  if (!itens || !itens.length) { alert('Nenhum item carregado.'); return; }

  var total    = itens.length;
  var contados = itens.filter(function(i){ return i.c > 0; }).length;
  var pct      = total > 0 ? Math.round(contados / total * 100) : 0;
  var vlrTotal = 0, vlrDiv = 0;
  itens.forEach(function(i){ var d=i.c-i.t; vlrTotal+=i.t*(i.vu||0); if(d!==0) vlrDiv+=Math.abs(d)*(i.vu||0); });
  function brl(v) {
    var s = Math.abs(v).toFixed(2);
    var parts = s.split('.');
    var intStr = parts[0];
    var dec = parts[1];
    var result = '';
    for (var i = 0; i < intStr.length; i++) {
      if (i > 0 && (intStr.length - i) % 3 === 0) result += '.';
      result += intStr[i];
    }
    return (v < 0 ? '-' : '') + 'R$ ' + result + ',' + dec;
  }

  var rows = itens.map(function(i,n){
    var dif=i.c-i.t;
    var bg=dif===0&&i.c>0?'#e6f5ed':dif!==0?'#fdeaea':'#fff';
    return '<tr style="background:'+bg+'">'
      +'<td style="padding:5px 8px;border-bottom:1px solid #eee;font-size:11px">'+(n+1)+'</td>'
      +'<td style="padding:5px 8px;border-bottom:1px solid #eee;font-size:11px">'+i.cod+'</td>'
      +'<td style="padding:5px 8px;border-bottom:1px solid #eee;font-size:11px">'+i.nm+'</td>'
      +'<td style="padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;text-align:center">'+i.t+'</td>'
      +'<td style="padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;text-align:center">'+i.c+'</td>'
      +'<td style="padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;text-align:center;font-weight:700;color:'+(dif===0?'#1E9A5A':dif>0?'#D09010':'#D93F3C')+'">'+dif+'</td>'
      +'<td style="padding:5px 8px;border-bottom:1px solid #eee;font-size:11px;text-align:right">'+brl(Math.abs(dif)*(i.vu||0))+'</td>'
      +'</tr>';
  }).join('');

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    +'<title>Relatório '+titulo+'</title>'
    +'<style>body{font-family:Arial,sans-serif;margin:20px;color:#14241B}'
    +'h1{color:#1B562F;font-size:18px;margin:0}h2{font-size:13px;color:#5E7569;font-weight:400;margin:4px 0 16px}'
    +'table{width:100%;border-collapse:collapse}th{background:#1B562F;color:#fff;padding:7px 8px;font-size:11px;text-align:left}'
    +'.kpi{display:inline-block;margin:0 12px 12px 0;padding:10px 16px;border:1px solid #DDE8E2;border-radius:8px}'
    +'.kpi b{display:block;font-size:22px;font-family:Arial;font-weight:900}'
    +'.kpi span{font-size:10px;color:#5E7569}'
    +'@media print{button{display:none}}'
    +'</style></head><body>'
    +'<div style="background:#1B562F;color:#fff;padding:16px 20px;border-radius:8px;margin-bottom:16px">'
    +'<h1>'+titulo+'</h1>'
    +'<h2 style="color:rgba(255,255,255,.8);margin:4px 0 0">Obra: '+obra+' &nbsp;·&nbsp; Token: '+token+' &nbsp;·&nbsp; '+agora+'</h2>'
    +'</div>'
    +'<div style="margin-bottom:16px">'
    +'<div class="kpi"><b>'+pct+'%</b><span>Acurácia</span></div>'
    +'<div class="kpi"><b>'+total+'</b><span>Total itens</span></div>'
    +'<div class="kpi"><b>'+contados+'</b><span>Contados</span></div>'
    +'<div class="kpi"><b>'+brl(vlrTotal)+'</b><span>Valor total SAP</span></div>'
    +'<div class="kpi" style="border-color:#D93F3C"><b style="color:#D93F3C">'+brl(vlrDiv)+'</b><span>Valor divergente</span></div>'
    +'</div>'
    +'<table><thead><tr><th>#</th><th>Código</th><th>Descrição</th><th>SAP</th><th>Contado</th><th>Dif.</th><th>Valor Div.</th></tr></thead>'
    +'<tbody>'+rows+'</tbody></table>'
    +'<div style="margin-top:40px;display:grid;grid-template-columns:1fr 1fr;gap:40px">'
    +'<div style="text-align:center;border-top:1px solid #333;padding-top:6px;font-size:11px">'+nome+'</div>'
    +'<div style="text-align:center;border-top:1px solid #333;padding-top:6px;font-size:11px">Gerente / Responsável</div>'
    +'</div>'
    +'<script>window.onload=function(){window.print();}<'+'/script>'
    +'</body></html>';

  var w = window.open('', '_blank');
  if (w) { w.document.write(html); w.document.close(); }
  else alert('Permita pop-ups no navegador para gerar o PDF.');
}

function compartilharRelatorio() {
  var titulo = localStorage.getItem('almv25_titulo') || State.token || '--';
  var itens  = _itensInv || [];
  var total  = itens.length;
  var contados = itens.filter(function(i){ return i.c > 0; }).length;
  var pct    = total > 0 ? Math.round(contados/total*100) : 0;
  var divs   = itens.filter(function(i){ return (i.c-i.t) !== 0; }).length;
  var txt    = 'RELATORIO: '+titulo+'\nAcuracia: '+pct+'%\nItens: '+contados+'/'+total+' contados\nDivergencias: '+divs+'\nData: '+new Date().toLocaleString('pt-BR');
  if (navigator.share) {
    navigator.share({ title: 'Relatório '+titulo, text: txt });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(function(){ alert('Relatório copiado!'); });
  } else {
    alert(txt);
  }
}

/* ============================================================
   DIAGNÓSTICO V25 -- passo a passo com logs
   ============================================================ */
var _diagLogs = [];

function diagSet(id, icon, txt, cor) {
  var el = document.getElementById(id);
  if (!el) return;
  el.style.color = cor || 'var(--ink)';
  el.textContent = icon + ' ' + txt;
}

function diagLog(msg) {
  var ts = new Date().toLocaleTimeString('pt-BR');
  _diagLogs.push('[' + ts + '] ' + msg);
  var lb = document.getElementById('diagLogsBody');
  if (lb) lb.innerHTML = _diagLogs.map(function(l){ return l; }).join('<br>');
}

function toggleLogs() {
  var el = document.getElementById('diagLogs');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function limparCacheTotal() {
  localStorage.clear();
  sessionStorage.clear();
  if ('caches' in window) {
    caches.keys().then(function(names){
      names.forEach(function(n){ caches.delete(n); });
    });
  }
  State.apiUrl = '';
  State.token = '';
  var inp = document.getElementById('apiUrlInput');
  if (inp) inp.value = '';
  var tk = document.getElementById('tokenInput');
  if (tk) tk.value = '';
  alert('✓ Cache limpo! Cole a URL nova e salve.');
}

function rodarDiagnostico() {
  _diagLogs = [];
  var ok = 'var(--ok)', err = 'var(--err)', warn = 'var(--warn)', muted = 'var(--ink3)';

  // Reset todos
  ['dInternetVal','dUrlVal','dFetchVal','dJsonpVal','dApiVerVal','dTokenVal','dLatenciaVal'].forEach(function(id){
    var e = document.getElementById(id); if(e){ e.style.color = muted; e.textContent = '⏳'; }
  });
  var errRow = document.getElementById('dErroRow'); if(errRow) errRow.style.display='none';

  diagLog('Diagnóstico V25 iniciado');

  // PASSO 1 -- Internet
  if (navigator.onLine) {
    diagSet('dInternetVal','🟢','Conectado', ok);
    diagLog('Internet: OK (navigator.onLine = true)');
  } else {
    diagSet('dInternetVal','🔴','Offline', err);
    diagLog('Internet: FALHOU -- dispositivo sem conexão');
    return;
  }

  // PASSO 2 -- URL
  var url = getUrl();
  if (!url) {
    diagSet('dUrlVal','🔴','Não encontrada -- salve a URL', err);
    diagLog('URL: FALHOU -- localStorage vazio e State.apiUrl vazio');
    return;
  }
  diagSet('dUrlVal','🟢','Encontrada', ok);
  diagLog('URL: ' + url);

  // PASSO 3 -- Fetch JSON (verifica CORS)
  var t0 = Date.now();
  diagSet('dFetchVal','⏳','Testando...', muted);
  diagLog('Fetch: tentando ' + url + '?action=ping&_=' + Date.now());

  fetch(url + '?action=ping&_=' + Date.now())
    .then(function(resp) {
      diagLog('Fetch: HTTP ' + resp.status + ' ' + resp.statusText);
      return resp.text();
    })
    .then(function(txt) {
      var ms = Date.now() - t0;
      diagLog('Fetch: resposta bruta = ' + txt.substring(0,120));
      // Tenta parsear como JSON
      try {
        var d = JSON.parse(txt);
        diagSet('dFetchVal','🟢','JSON válido', ok);
        diagLog('Fetch: JSON parseado OK. ok=' + d.ok + ' status=' + d.status);
        diagSet('dApiVerVal', '', d.versaoApi || d.version || d.status || '--', ok);
        diagLog('API versão: ' + (d.versaoApi || d.version || '--'));
      } catch(e) {
        // Pode ser JSONP -- resposta com callback wrapping
        if (txt.indexOf('(') > -1) {
          diagSet('dFetchVal','🟡','Resposta JSONP (não JSON puro)', warn);
          diagLog('Fetch: resposta não é JSON puro -- é JSONP. Isso é normal se a API só suporta JSONP.');
        } else {
          diagSet('dFetchVal','🔴','Resposta inválida', err);
          diagLog('Fetch: ERRO parse JSON -- ' + e.message);
          mostrarErro('Resposta inválida: ' + txt.substring(0,80));
        }
      }
      diagSet('dLatenciaVal','', ms + ' ms', ms < 2000 ? ok : warn);
    })
    .catch(function(e) {
      diagSet('dFetchVal','🔴','Erro CORS / rede', err);
      diagLog('Fetch ERRO: ' + e.message);
      diagLog('DICA: Se for CORS, o JSONP ainda pode funcionar. Testando...');
      mostrarErro(e.message);
    });

  // PASSO 4 -- JSONP (método principal do app)
  diagSet('dJsonpVal','⏳','Testando...', muted);
  var cbName = '_diagJsonp' + Date.now();
  var t1 = Date.now();
  var jsonpDone = false;
  var jsonpTimer = setTimeout(function() {
    if (!jsonpDone) {
      jsonpDone = true;
      diagSet('dJsonpVal','🔴','Timeout (8s) -- sem resposta', err);
      diagLog('JSONP: TIMEOUT -- a API não respondeu em 8s');
      diagLog('DICA 1: Reimplante o script como "Qualquer pessoa" no Apps Script');
      diagLog('DICA 2: Verifique se a URL não está desatualizada (URL antiga salva)');
      diagLog('DICA 3: Abra a URL no navegador e veja o que retorna');
      mostrarErro('JSONP timeout -- reimplante o Apps Script como "Qualquer pessoa"');
      delete window[cbName];
    }
  }, 8000);

  window[cbName] = function(d) {
    clearTimeout(jsonpTimer);
    if (jsonpDone) return;
    jsonpDone = true;
    var ms2 = Date.now() - t1;
    delete window[cbName];
    diagLog('JSONP: resposta recebida em ' + ms2 + 'ms. ok=' + d.ok + ' status=' + d.status);
    if (d && (d.ok || d.status === 'online')) {
      diagSet('dJsonpVal','🟢','Funcionando', ok);
      diagSet('dApiVerVal','', d.versaoApi || d.version || d.status || '--', ok);
      diagSet('dLatenciaVal','', ms2 + ' ms', ms2 < 2000 ? ok : warn);
      diagLog('API OK! versão=' + (d.versaoApi||'--') + ' data=' + (d.data||'--'));
      // Testa token se tiver
      var tok = State.token || localStorage.getItem('almv25_token') || '';
      if (tok) {
        testarTokenDiag(tok);
      } else {
        diagSet('dTokenVal','🟡','Nenhum token salvo', warn);
        diagLog('Token: nenhum token configurado');
      }
    } else {
      diagSet('dJsonpVal','🔴','Resposta inválida', err);
      diagLog('JSONP: resposta sem ok=true: ' + JSON.stringify(d).substring(0,100));
      mostrarErro('API retornou ok=false. Verifique o código do Apps Script (ação ping).');
    }
  };

  var s = document.createElement('script');
  s.src = url + '?action=ping&callback=' + cbName + '&_=' + Date.now();
  s.onerror = function() {
    clearTimeout(jsonpTimer);
    if (jsonpDone) return;
    jsonpDone = true;
    delete window[cbName];
    diagSet('dJsonpVal','🔴','Erro ao carregar script', err);
    diagLog('JSONP script.onerror -- URL bloqueada ou inválida: ' + s.src);
    mostrarErro('JSONP bloqueado. Verifique a URL e se o script está publicado.');
  };
  diagLog('JSONP: carregando ' + s.src.substring(0,80) + '...');
  document.head.appendChild(s);
}

function testarTokenDiag(tok) {
  var ok = 'var(--ok)', err = 'var(--err)', warn = 'var(--warn)';
  diagSet('dTokenVal','⏳','Testando token ' + tok + '...', 'var(--ink3)');
  diagLog('Token: testando token=' + tok);
  apiJsonp('buscarToken', { token: tok }, function(r) {
    if (r && r.ok) {
      diagSet('dTokenVal','🟢','Token ' + tok + ' válido -- ' + (r.inventario||''), ok);
      diagLog('Token OK: inventario=' + (r.inventario||'--') + ' obra=' + (r.obra||'--'));
    } else {
      diagSet('dTokenVal','🔴','Token ' + tok + ' não encontrado', err);
      diagLog('Token FALHOU: API retornou ' + JSON.stringify(r||{}).substring(0,60));
    }
  });
}

function mostrarErro(msg) {
  var row = document.getElementById('dErroRow');
  var txt = document.getElementById('dErroTxt');
  if (row) row.style.display = 'flex';
  if (txt) txt.textContent = msg;
  diagLog('ERRO registrado: ' + msg);
}

/* --- Inventários --- */
var _invDados = [];
var _invTab   = 'andamento';

function loadInventarios() {
  var box = document.getElementById('invList');
  if (!box) return;

  // Mostra o inventário já carregado via token (State.inventarioAtual)
  // mais a lista completa da API
  var url = getUrl();

  // Se não tem URL, mostra só o inventário do token atual se existir
  if (!url) {
    renderInvLocal(box);
    return;
  }

  box.innerHTML = '<div class="empty"><p>Carregando...</p></div>';

  apiJsonp('listarInventarios', {}, function(r) {
    if (r && r.ok && r.inventarios && r.inventarios.length) {
      _invDados = r.inventarios;
      renderInvLista(box, r.inventarios);
    } else {
      // Fallback: mostra só o inventário do token atual
      renderInvLocal(box);
    }
  });
}

// Guarda lista de inventários para navegação
var _invIndex = {};

function renderInvLocal(box) {
  var token = State.token || localStorage.getItem('almv25_token') || '';
  var obra  = State.obra  || localStorage.getItem('almv25_obra')  || '';
  var titulo = localStorage.getItem('almv25_titulo') || token;

  if (!token) {
    box.innerHTML = '<div class="empty"><div class="ico">📋</div><p>Nenhum inventário carregado.<br>Vá em Mais → Conexão API e carregue um token.</p></div>';
    return;
  }

  _invIndex[token] = { token: token, titulo: titulo, obra: obra };

  box.innerHTML = '<div class="card mb12">'
    + '<div class="list-row inv-item" data-inv-token="' + token + '" style="cursor:pointer">'
    + '<div class="thumb">📋</div>'
    + '<div style="flex:1">'
    + '<div style="font-size:14px;font-weight:700">' + (titulo || token) + '</div>'
    + '<div class="note">' + (obra ? 'Obra: ' + obra : token) + '</div>'
    + '<div class="note" style="margin-top:4px;color:var(--ok)">Token: ' + token + '</div>'
    + '</div>'
    + '<span class="pill ok">Ativo</span>'
    + '</div></div>';
}

function renderInvLista(box, lista) {
  if (!lista || !lista.length) {
    renderInvLocal(box);
    return;
  }

  // Filtra por aba
  var tab = window._invTab || 'andamento';
  var _fins = [];
  try { _fins = JSON.parse(localStorage.getItem('almv25_finalizados') || '[]'); } catch(e) {}

  lista = lista.filter(function(inv) {
    var st  = String(inv.status || '').toUpperCase();
    var tok = inv.token || inv.rotId || '';
    var finalizado = st === 'FINALIZADO' || st === 'APROVADO' || st === 'CONCLUIDO' || _fins.indexOf(tok) >= 0;
    if (tab === 'finalizados') return finalizado;
    return !finalizado;
  });

  var html = '<div class="card mb12">';
  lista.forEach(function(inv) {
    var token  = inv.token  || inv.rotId || '';
    var titulo = inv.titulo || token;
    var obra   = inv.obra   || '';
    var lanc   = Number(inv.itensLanc)  || 0;
    var esper  = Number(inv.itensEsper) || 0;
    var pct    = esper > 0 ? Math.round(lanc / esper * 100) : 0;
    var cor    = pct >= 90 ? 'var(--ok)' : pct >= 50 ? 'var(--warn)' : 'var(--err)';
    var pillCls= pct >= 90 ? 'ok' : pct >= 50 ? 'warn' : 'err';
    var progCls= pct >= 90 ? '' : pct >= 50 ? ' warn' : ' err';

    _invIndex[token] = { token: token, titulo: titulo, obra: obra };

    html += '<div class="list-row inv-item" data-inv-token="' + token + '" style="cursor:pointer">'
      + '<div class="thumb">📋</div>'
      + '<div style="flex:1">'
      + '<div style="font-size:14px;font-weight:700">' + titulo + '</div>'
      + (obra ? '<div class="note">Obra: ' + obra + '</div>' : '')
      + '<div class="note">Token: ' + token + '</div>'
      + (esper > 0
        ? '<div style="display:flex;gap:6px;align-items:center;margin-top:4px">'
          + '<div class="prog" style="flex:1"><div class="prog-fill' + progCls + '" style="width:' + pct + '%"></div></div>'
          + '<span style="font-size:11px;font-weight:700;color:' + cor + '">' + lanc + '/' + esper + '</span>'
          + '</div>'
        : '')
      + '</div>'
      + (esper > 0 ? '<span class="pill ' + pillCls + '">' + pct + '%</span>' : '<span class="pill ok">Ativo</span>')
      + '</div>';
  });
  html += '</div>';
  box.innerHTML = html;
}

function filtrarInv(termo) {
  if (!_invDados.length) return;
  if (!termo) { renderInvLista(document.getElementById('invList'), _invDados); return; }
  var t = termo.toLowerCase();
  var filtrado = _invDados.filter(function(i) {
    return String(i.titulo||'').toLowerCase().indexOf(t) >= 0
        || String(i.token||'').toLowerCase().indexOf(t) >= 0
        || String(i.obra||'').toLowerCase().indexOf(t) >= 0;
  });
  renderInvLista(document.getElementById('invList'), filtrado);
}

function abrirInventario(inv) {
  // Salva o inventário selecionado e abre a tela de itens
  State.token = inv.token || State.token;
  State.obra  = inv.obra  || State.obra;
  localStorage.setItem('almv25_titulo', inv.titulo || inv.token);
  go('inventResultado');
  // Carrega os itens deste inventário
  setTimeout(function() { loadItensInventario(inv.token); }, 100);
}

function tabInv(btn, tab) {
  _invTab = tab;
  document.querySelectorAll('[data-screen="inventarios"] .tab-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  btn.classList.add('active');
  loadInventarios();
}

/* --- Itens do Inventário --- */
var _itensInv = [];
var _itensIndex = {};

function loadItensInventario(token) {
  var tok = token || State.token || localStorage.getItem('almv25_token') || '';
  if (!tok || !getUrl()) return;

  // Atualiza header da tela
  var titulo = localStorage.getItem('almv25_titulo') || tok;
  var hdr = document.querySelector('[data-screen="inventResultado"] h1');
  if (hdr) hdr.textContent = titulo;

  // Carrega itens via API
  apiJsonp('carregarInventario', { token: tok }, function(r) {
    if (!r || !r.ok) return;
    _itensInv = r.itens || [];

    // Atualiza os indicadores no topo
    var el;
    el = document.getElementById('invResOS');    if (el) el.textContent = r.titulo || tok;
    el = document.getElementById('invResObra');  if (el) el.textContent = r.obra   || '';
    el = document.getElementById('invResTotal'); if (el) el.textContent = r.total  || 0;

    // Renderiza a lista de indicadores
    renderIndicadores(r.itens || []);
  });
}

function renderIndicadores(itens) {
  // Calcula divergências
  var divs = itens.filter(function(i) { return (i.dif || (i.c - i.t)) !== 0; });
  var contados = itens.filter(function(i) { return i.c > 0; });
  var pct = itens.length > 0 ? Math.round(contados.length / itens.length * 100) : 0;

  var el;
  el = document.getElementById('invResContados');  if (el) el.textContent = contados.length;
  el = document.getElementById('invResDivs');      if (el) el.textContent = divs.length;
  el = document.getElementById('invResPct');       if (el) { el.textContent = pct + '%'; el.style.color = pct>=90?'var(--ok)':pct>=50?'var(--warn)':'var(--err)'; }

  // Renderiza lista agrupada por localização/depósito
  var box = document.getElementById('invItensList');
  if (!box) return;
  if (!itens.length) {
    box.innerHTML = '<div class="empty"><p>Nenhum item encontrado neste inventário.</p></div>';
    return;
  }

  // Agrupa por depósito (prefixo da localização)
  var grupos = {};
  itens.forEach(function(it, idx) {
    var loc = String(it.local || it.loc || '').trim();
    var dep = loc ? (loc.split('-')[0].split('/')[0].substring(0,6).trim() || 'SEM LOCAL') : 'SEM LOCAL';
    if (!grupos[dep]) grupos[dep] = [];
    grupos[dep].push({ it: it, idx: idx });
  });

  var depKeys = Object.keys(grupos).sort();
  var html = '';

  depKeys.forEach(function(dep) {
    var grupo = grupos[dep];
    var totalG = grupo.length;
    var contG  = grupo.filter(function(g){ return g.it.c > 0; }).length;
    var divG   = grupo.filter(function(g){ var d=g.it.dif!==undefined?g.it.dif:(g.it.c-g.it.t); return d!==0&&g.it.c>0; }).length;
    var pctG   = totalG > 0 ? Math.round(contG/totalG*100) : 0;
    var corG   = pctG>=90?'#1e6b45':pctG>=50?'#b45309':'#b91c1c';

    html += '<div style="margin-bottom:6px">';
    html += '<div onclick="(function(el){var nx=el.nextElementSibling;var ar=el.querySelector(\'.gar\');if(nx){var ab=nx.style.display!==\'none\';nx.style.display=ab?\'none\':\'block\';if(ar)ar.textContent=ab?\'▶\':\'▼\';};})(this)" style="background:var(--g600);color:#fff;padding:9px 14px;border-radius:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer">';
    html += '<div style="font-weight:800;font-size:13px">📍 Depósito: ' + dep + '</div>';
    html += '<div style="display:flex;align-items:center;gap:8px;font-size:11px">';
    html += contG + '/' + totalG + ' contados';
    if (divG>0) html += ' &nbsp;<span style="background:rgba(255,255,255,.3);border-radius:5px;padding:1px 6px">' + divG + ' div.</span>';
    html += ' &nbsp;<b>' + pctG + '%</b>';
    html += ' &nbsp;<span class="gar">▼</span>';
    html += '</div></div>';
    html += '<div class="card" style="margin-top:2px">';

    grupo.forEach(function(g) {
      var it = g.it; var i = g.idx;
      var dif = it.dif !== undefined ? it.dif : (it.c - it.t);
      var difCor = dif===0?'var(--ok)':dif>0?'var(--warn)':'var(--err)';
      var difTxt = dif===0?'✓':(dif>0?'+'+dif:String(dif));
      var bloq = it._bloqueado;
      var bg = bloq?'background:#fff3cd;':(it.c>0?'background:var(--okbg);':'');
      var onclick = bloq
        ? 'alert(\'🔒 Item sendo contado por ' + (it._bloqueadoPor||'outro operador') + '\')'
        : 'abrirContagemItem(' + i + ')';
      html += '<div class="list-row item-cont" data-item-idx="' + i + '" onclick="' + onclick + '" style="cursor:' + (bloq?'not-allowed':'pointer') + ';' + bg + '">';
      html += '<div class="thumb sm">' + (bloq?'🔒':'📦') + '</div>';
      html += '<div style="flex:1">';
      html += '<div style="font-size:13px;font-weight:700">' + (it.nm||it.cod) + '</div>';
      html += '<div class="code">' + it.cod + (it.local?' · '+it.local:'') + (bloq?' · <span style="color:#b45309">🔒 '+( it._bloqueadoPor||'Bloqueado')+'</span>':'') + '</div>';
      html += '<div style="font-size:11px;margin-top:3px">SAP: <b>' + it.t + '</b> · Contado: <b style="color:' + (it.c>0?'var(--ok)':'var(--ink3)') + '">' + it.c + '</b></div>';
      html += '</div>';
      html += '<div style="text-align:right"><div style="font-size:18px;font-weight:900;color:' + difCor + '">' + difTxt + '</div><div style="font-size:10px;color:var(--ink3)">' + (it.un||'UN') + '</div></div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  box.innerHTML = html;
}

function fecharModal() {
  var m = document.getElementById('modalContagem');
  if (m) m.remove();
}

function adjModalCnt(d) {
  var v = parseInt(window._modalCntStr || '0', 10) + d;
  if (v < 0) v = 0;
  window._modalCntStr = String(v);
  var el = document.getElementById('modalCntVal');
  if (el) el.textContent = v;
}

function kpModal(k) {
  var s = window._modalCntStr || '0';
  if (k === 'C') s = '0';
  else if (k === '⌫') s = s.length > 1 ? s.slice(0, -1) : '0';
  else { if (s === '0') s = ''; s += k; }
  window._modalCntStr = s;
  var el = document.getElementById('modalCntVal');
  if (el) el.textContent = s || '0';
}

function salvarContagemItem() {
  var info = window._itemContAtual;
  if (!info) return;
  var it  = info.it;
  var idx = info.idx;
  var qtd = parseInt(window._modalCntStr || '0', 10);
  var tok = State.token || localStorage.getItem('almv25_token') || '';

  if (!getUrl()) { alert('Configure a URL da API em Mais → Conexão API.'); return; }
  if (!tok)      { alert('Carregue o inventário primeiro.'); return; }

  var btn = document.querySelector('#modalContagem button:last-child');
  if (btn) btn.textContent = 'Salvando...';

  apiJsonp('lancarItemToken', {
    token:             tok,
    codigoMaterial:    it.cod,
    descricao:         it.nm || '',
    quantidadeContada: qtd,
    quantidadeSap:     it.t  || 0,
    valorUnitario:     it.vu || 0,
    unidade:           it.un || 'UN',
    local:             it.local || '',
    lancadoPor:        lancadoPor,
    indicadorIt:       indicadorIt
  }, function(r) {
    if (r && r.ok) {
      // Atualiza localmente
      _itensInv[idx].c   = qtd;
      _itensInv[idx].dif = qtd - (it.t || 0);
      fecharModal();
      // Recarrega lista
      renderIndicadores(_itensInv);
      alert('✓ Contagem salva!');
    } else {
      alert('Erro ao salvar. Verifique a conexão.');
      if (btn) btn.textContent = '✓ Confirmar Contagem';
    }
  });
}
